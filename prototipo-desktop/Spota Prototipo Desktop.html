<script type="text/babel" data-presets="react">
// Detalle de lugar — versión desktop con CTA de 4 estados (D8 del CLAUDE.md)
// Estados: available → declared → visited → published
const ScreenPlaceDetail = ({ nav, params }) => {
  const place = PLACES.find(p => p.id === params?.id) || PLACES[0];
  const initial = place.visited ? 'visited' : 'available';
  const [visitState, setVisitState] = React.useState(initial);
  const nearby = PLACES.filter(p => p.id !== place.id).slice(0, 4);

  const ctaRow = () => {
    if (visitState === 'available') return (
      <>
        <Btn variant="primary" icon="compass" onClick={() => setVisitState('declared')}>Quiero ir</Btn>
        <Btn variant="outline" icon="collection">Guardar</Btn>
      </>
    );
    if (visitState === 'declared') return (
      <>
        <Btn variant="outline" icon="check" onClick={() => setVisitState('visited')}>Simular llegada</Btn>
        <Btn variant="ghost" onClick={() => setVisitState('available')}>Cancelar</Btn>
      </>
    );
    if (visitState === 'visited') return (
      <>
        <Btn variant="primary" icon="edit" onClick={() => setVisitState('published')}>Publicar experiencia</Btn>
        <Btn variant="outline" icon="collection">Guardar</Btn>
      </>
    );
    return (
      <>
        <Btn variant="primary" icon="eye" onClick={() => nav('home')}>Ver tu reseña</Btn>
        <Btn variant="outline" icon="edit">Editar</Btn>

          <div style={{ position: 'relative', borderRadius: SPOTA.radius.xl, overflow: 'hidden', height: 480, marginBottom: 24 }}>
            <img src={photo(place.img, 1200, 800)} style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
            <div style={{ position: 'absolute', top: 16, right: 16, display: 'flex', gap: 8 }}>
              <button style={{ width: 42, height: 42, borderRadius: 999, border: 'none', background: 'rgba(255,255,255,0.92)', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', backdropFilter: 'blur(8px)' }}>
                <Icon name="share" size={18} />
              </button>
              <button style={{ width: 42, height: 42, borderRadius: 999, border: 'none', background: 'rgba(255,255,255,0.92)', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', backdropFilter: 'blur(8px)' }}>

          </div>

          {/* Tags */}
          <div style={{ display: 'flex', gap: 6, marginBottom: 12, alignItems: 'center', flexWrap: 'wrap' }}>

            <FamaScore score={place.score} count={place.reviews} size="lg" />

          <p style={{ margin: '0 0 22px', fontFamily: SPOTA.font.ui, fontSize: 16, color: SPOTA.c.text, lineHeight: 1.6, maxWidth: 680 }}>

                    <div style={{ display: 'flex' }}>{[...Array(r.score)].map((_, i) => <Icon key={i} name="star" size={13} color={SPOTA.c.accent} />)}</div>

<script type="text/babel" data-presets="react">
// Stepper horizontal para wizards desktop. 3 segmentos con número, label y línea conectiva.
const Stepper = ({ steps, current }) => (
  <div style={{ display: 'flex', alignItems: 'center', gap: 12, maxWidth: 720, margin: '0 auto 32px' }}>
    {steps.map((s, i) => {
      const done = i + 1 < current;
      const active = i + 1 === current;
      return (
        <React.Fragment key={s}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <div style={{
              width: 32, height: 32, borderRadius: 999,
              background: done || active ? SPOTA.c.primary : SPOTA.c.surface,
              border: `1.5px solid ${done || active ? SPOTA.c.primary : SPOTA.c.line}`,
              color: done || active ? '#fff' : SPOTA.c.textMuted,
              display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
              fontFamily: SPOTA.font.ui, fontWeight: 700, fontSize: 13.5,
            }}>
              {done ? <Icon name="check" size={14} color="#fff" strokeWidth={3} /> : i + 1}
            </div>
            <span style={{
              fontFamily: SPOTA.font.ui, fontWeight: active ? 700 : 500, fontSize: 13.5,
              color: active ? SPOTA.c.text : SPOTA.c.textSoft, whiteSpace: 'nowrap',
            }}>{s}</span>
          </div>
          {i < steps.length - 1 && (
            <div style={{ flex: 1, height: 2, background: done ? SPOTA.c.primary : SPOTA.c.line, borderRadius: 999 }} />
          )}
        </React.Fragment>
      );
    })}
  </div>
);

Object.assign(window, { Stepper });
</script>

      </p>
      <div style={{ display: 'inline-flex', gap: 10 }}>

        <Btn variant="outline" icon="sparkles" onClick={() => nav('uikit')}>Ver UI Kit</Btn>
      </div>
    </section>
  );
};

const SCREENS = {
  home:             ScreenDiscover,
  placeDetail:      ScreenPlaceDetail,
  collections:      ScreenCollections,
  collectionDetail: ScreenCollectionDetail,
  publish:          ScreenPublish,
  plans:            ScreenPlans,
  createPlan:       ScreenCreatePlan,
  planVote:         ScreenPlanVote,
  planClose:        ScreenPlanClose,
  hostMarketplace:  ScreenHostMarketplace,
  createOffer:      ScreenCreateOffer,
  hireHost:         ScreenHireHost,
  registerHost:     ScreenRegisterHost,
  hostDashboard:    ScreenHostDashboard,
  bizRegister:      ScreenBizRegister,
  bizHome:          ScreenBizHome,
  claimPlace:       ScreenClaimPlace,
  bizBenefits:      ScreenBizBenefits,
  bizCampaign:      ScreenBizCampaign,
  bizInsights:      ScreenBizInsights,
  uikit:            ScreenDesignSystem,
  profile:          ScreenSoon,
};

// Mapping de pantalla a ítem del nav (para resaltar el tab activo cuando estás en una pantalla hija).
const NAV_PARENT = {
  placeDetail: 'home',
  collectionDetail: 'collections',
  createPlan: 'plans',
  planVote: 'plans',
  planClose: 'plans',
  hostMarketplace: 'plans',
  createOffer: 'plans',
  hireHost: 'plans',
  registerHost: 'profile',
  hostDashboard: 'profile',
};

// Pantallas del panel de Negocios — usan BizFrame en lugar del DesktopFrame.
const BIZ_SCREENS = new Set(['bizHome', 'claimPlace', 'bizBenefits', 'bizCampaign', 'bizInsights']);
// Pantallas sin frame (entry sin auth, full-bleed).
const NO_FRAME_SCREENS = new Set(['bizRegister']);

function App() {
  const [current, setCurrent] = React.useState('home');
  const [params, setParams] = React.useState({});
  const nav = (id, p = {}) => { setCurrent(id); setParams(p); window.scrollTo(0, 0); };
  const Screen = SCREENS[current] || ScreenSoon;
  const navHighlight = NAV_PARENT[current] || current;

  let content;
  if (NO_FRAME_SCREENS.has(current)) {
    content = <Screen current={current} nav={nav} params={params} />;
  } else if (BIZ_SCREENS.has(current)) {
    content = (
      <BizFrame current={current} nav={nav}>
        <Screen current={current} nav={nav} params={params} />
      </BizFrame>
    );
  } else {
    content = (
      <DesktopFrame current={navHighlight} nav={nav}>
        <Screen current={current} nav={nav} params={params} />
      </DesktopFrame>
    );
  }

  return <SmallViewportGuard>{content}</SmallViewportGuard>;
}

const root = ReactDOM.createRoot(document.getElementById('app'));
root.render(<App />);
</script>
