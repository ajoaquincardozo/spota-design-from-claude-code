}

function hashStr(s) { let h = 0; for (let i = 0; i < s.length; i++) h = ((h << 5) - h) + s.charCodeAt(i); return h; }
function avatar(seed, w = 120) {
  const ids = [
    'photo-1494790108377-be9c29b29330', 'photo-1535713875002-d1d0cf377fde',

    'photo-1531123897727-8f129e1688ce', 'photo-1487412720507-e7ab37603c6f',
  ];
  return `https://images.unsplash.com/${ids[Math.abs(hashStr(seed)) % ids.length]}?w=${w}&h=${w}&fit=crop&auto=format&q=70`;
}

Object.assign(window, { SPOTA, PHOTOS, photo, avatar });

// ─────────────────────────────────────────────────────────────
// Concierge — datos y helpers compartidos con mobile
// (interpretación de query, etiqueta de afinidad, reviewers afines).
// Si más adelante se consolida un design-system.js común, este bloque
// se extrae junto con SearchBar / IntentChips / AffineRow.
// ─────────────────────────────────────────────────────────────
const SEARCH_PLACEHOLDERS = [
  'algo tranquilo en Palermo...',
  'cena romántica el sábado...',
  'café para trabajar con buen wifi...',

  p8:  ['Andrés L.'],
  p10: ['Sofía M.', 'Mati R.'],
  p11: ['Cami P.', 'Tomás S.', 'Andrés L.'],
};

function affinityLabel(score) {
  if (score == null) return null;
  if (score >= 88) return { label: 'Alto match', tone: 'primary' };
  if (score >= 78) return { label: 'Buen match', tone: 'soft'    };
  return null;
}

function interpretQuery(text) {
  if (!text) return {};
  const t = text.toLowerCase();
  const out = {};

  const ambiente = [
    { kw: ['tranquilo', 'tranqui', 'relajado', 'silencioso', 'tranquila'], v: 'tranquilo' },
    { kw: ['romántico', 'romántica', 'romantico', 'romantica', 'íntimo', 'intimo'], v: 'romántico' },
    { kw: ['movido', 'fiesta', 'after', 'after office', 'ruidoso'],     v: 'movido' },
    { kw: ['charlar', 'conversar'],                                       v: 'charlar' },
    { kw: ['trabajar', 'wifi', 'laburar', 'remoto'],                      v: 'trabajar' },
    { kw: ['económico', 'economico', 'barato', 'low cost'],               v: 'económico' },
  ];
  for (const a of ambiente) if (a.kw.some(k => t.includes(k))) { out.ambiente = a.v; break; }

  // compañía — el plural va antes del singular para que "amigos" no matchee "amigo"
  const compania = [
    { kw: ['con amigas'],                              v: 'con amigas' },
    { kw: ['con una amiga', 'con amiga', 'una amiga'], v: 'con amiga'  },
    { kw: ['con amigos'],                              v: 'con amigos' },
    { kw: ['con un amigo', 'con amigo', 'un amigo'],   v: 'con amigo'  },
    { kw: ['en pareja', 'mi pareja', 'cita'],          v: 'pareja'     },
    { kw: ['en familia', 'con mi familia'],            v: 'familia'    },
    { kw: ['en grupo', 'grupo'],                       v: 'grupo'      },
    { kw: ['solo', 'sola'],                            v: 'solo'       },
  ];
  for (const c of compania) if (c.kw.some(k => t.includes(k))) { out.compania = c.v; break; }

  const momento = [
    { kw: ['hoy'],                          v: 'hoy'      },
    { kw: ['mañana', 'manana'],             v: 'mañana'   },
    { kw: ['esta noche', 'a la noche'],     v: 'esta noche' },
    { kw: ['esta tarde', 'a la tarde'],     v: 'esta tarde' },
    { kw: ['lunes'],   v: 'lunes'   },
    { kw: ['martes'],  v: 'martes'  },
    { kw: ['miércoles', 'miercoles'], v: 'miércoles' },
    { kw: ['jueves'],  v: 'jueves'  },
    { kw: ['viernes'], v: 'viernes' },
    { kw: ['sábado', 'sabado'], v: 'sábado' },
    { kw: ['domingo'], v: 'domingo' },
    { kw: ['fin de semana', 'finde'], v: 'fin de semana' },
  ];
  for (const m of momento) if (m.kw.some(k => t.includes(k))) { out.momento = m.v; break; }

  const categoria = [
    { kw: ['café', 'cafe', 'cafés', 'cafes', 'cafetería', 'cafeteria'], v: 'cafés' },
    { kw: ['cena', 'cenar', 'comer', 'restaurante', 'comida'],          v: 'comida' },
    { kw: ['bar', 'bares', 'tragos', 'cerveza', 'cervecería'],          v: 'bares' },
    { kw: ['cultura', 'museo', 'librería', 'libreria', 'cine', 'arte'], v: 'cultura' },
    { kw: ['parque', 'aire libre', 'caminar', 'paseo'],                 v: 'aire libre' },
  ];
  for (const c of categoria) if (c.kw.some(k => t.includes(k))) { out.categoria = c.v; break; }

  const zonas = ['Palermo', 'San Telmo', 'Villa Crespo', 'Colegiales', 'Recoleta',
                 'Caballito', 'Chacarita', 'Boedo', 'Centro', 'Belgrano'];
  for (const z of zonas) if (t.includes(z.toLowerCase())) { out.zona = z; break; }

  return out;
}

// ─────────────────────────────────────────────────────────────
// CU-004-002 + CU-007-004/005 — Sets unificados de Ámbito (Colecciones)
// y Actividad (Colecciones + Insights + Campañas). Mantener acá como
// fuente única para evitar drift entre pantallas.
// ─────────────────────────────────────────────────────────────
const SCOPE_OPTIONS = ['Mías', 'Guardadas', 'De la comunidad', 'Todas'];
const ACTIVITY_OPTIONS = ['Café', 'Cena', 'Trago', 'Arte y cultura',
  'Trabajo nómade', 'Tarde con amigos', 'Cita romántica', 'Deporte', 'Todas'];

const CAT_TO_ACTIVITY = {
  'Cafetería': 'Café',
  'Restaurante': 'Cena',
  'Parrilla': 'Cena',
  'Bar': 'Trago',
  'Vinos': 'Trago',
  'Cervecería': 'Trago',
  'Cultura': 'Arte y cultura',
  'Recorrido': 'Arte y cultura',
  'Mercado': 'Arte y cultura',
  'Heladería': 'Tarde con amigos',
  'Aire libre': 'Deporte',
  'Bienestar': 'Deporte',
};
function matchesActivity(place, activity) {
  if (!activity || activity === 'Todas') return true;
  return CAT_TO_ACTIVITY[place.cat] === activity;
}
function collectionMatchCount(c, activity) {
  if (!activity || activity === 'Todas') return null;
  const seed = Math.abs(hashStr(c.id + ':' + activity));
  return Math.max(1, seed % Math.max(2, c.count));
}
const SAVED_COLLECTION_IDS = new Set(['c1', 'c4']);
function collectionIsSaved(c) { return SAVED_COLLECTION_IDS.has(c.id); }
function collectionIsMine(c) { return c.by === 'Vos'; }
function collectionInScope(c, scope) {
  if (!scope || scope === 'Todas') return true;
  if (scope === 'Mías') return collectionIsMine(c);
  if (scope === 'Guardadas') return collectionIsSaved(c);
  if (scope === 'De la comunidad') return !collectionIsMine(c);
  return true;
}

Object.assign(window, { PLACES, CATEGORIES, REVIEWS, COLLECTIONS, PLAN_OPTIONS, HOSTS, OFFERS,
                        SEARCH_PLACEHOLDERS, AFFINE_REVIEWERS, affinityLabel, interpretQuery,
                        SCOPE_OPTIONS, ACTIVITY_OPTIONS, CAT_TO_ACTIVITY,
                        matchesActivity, collectionMatchCount, collectionIsSaved,
                        collectionIsMine, collectionInScope });
</script>

const SpotaLogo = ({ size = 28, color = SPOTA.c.primary }) => (
  <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
    <Icon name="pinFill" size={size} color={color} />
    <span style={{ fontFamily: SPOTA.font.ui, fontWeight: 800, fontSize: size * 0.95, color: SPOTA.c.text, letterSpacing: -0.4 }}>
      Spota
    </span>
  </div>
);

const Btn = ({ children, variant = 'primary', size = 'md', onClick, full, icon, iconRight, style = {}, disabled }) => {
  const sizes = { sm: { h: 36, px: 14, fs: 14, r: 10 }, md: { h: 44, px: 18, fs: 14.5, r: 12 }, lg: { h: 52, px: 22, fs: 16, r: 14 } }[size];
  const palettes = {
    primary: { bg: SPOTA.c.primary, c: '#fff', bd: 'transparent', hover: SPOTA.c.primaryDark },
    secondary: { bg: SPOTA.c.secondary, c: '#fff', bd: 'transparent', hover: SPOTA.c.secondaryDark },
    outline: { bg: 'transparent', c: SPOTA.c.text, bd: SPOTA.c.line, hover: SPOTA.c.bgAlt },
    ghost: { bg: 'transparent', c: SPOTA.c.text, bd: 'transparent', hover: SPOTA.c.lineSoft },
  }[variant];
  const [hover, setHover] = React.useState(false);
  return (
    <button onClick={onClick} disabled={disabled}
      onMouseEnter={() => !disabled && setHover(true)} onMouseLeave={() => setHover(false)}
      style={{
        height: sizes.h, padding: `0 ${sizes.px}px`, borderRadius: sizes.r,
        background: hover && !disabled ? palettes.hover : palettes.bg, color: palettes.c,
        border: `1px solid ${palettes.bd === 'transparent' ? 'transparent' : palettes.bd}`,
        fontFamily: SPOTA.font.ui, fontWeight: 600, fontSize: sizes.fs,
        cursor: disabled ? 'not-allowed' : 'pointer', opacity: disabled ? 0.5 : 1,
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8,
        width: full ? '100%' : 'auto', transition: 'background 120ms, transform 120ms',
        transform: hover && !disabled ? 'translateY(-1px)' : 'none',
        ...style,
      }}>
      {icon && <Icon name={icon} size={18} />}
      {children}
      {iconRight && <Icon name={iconRight} size={18} />}
    </button>
  );
};

const Avatar = ({ name, size = 40, score }) => (
  <div style={{ position: 'relative', display: 'inline-flex' }}>
    <img src={avatar(name, size * 2)} alt={name}
      style={{ width: size, height: size, borderRadius: 999, objectFit: 'cover',
        border: score ? `2px solid ${SPOTA.c.accent}` : `1.5px solid ${SPOTA.c.line}` }} />
    {score && (
      <span style={{
        position: 'absolute', bottom: -2, right: -4,
        background: SPOTA.c.surface, color: SPOTA.c.text,
        fontFamily: SPOTA.font.ui, fontWeight: 700, fontSize: 10,
        padding: '1px 5px', borderRadius: 999, border: `1px solid ${SPOTA.c.line}`,
      }}>{score}</span>
    )}
  </div>
);

// Tag — píldora de estado / beneficio (Popular, Nuevo, Recomendado, etc.)
const Tag = ({ children, kind = 'secondary', icon, style = {} }) => {
  const palettes = {
    secondary: { bg: SPOTA.c.secondary, c: '#fff' },
    accent:    { bg: SPOTA.c.accent, c: '#2B2523' },
    primary:   { bg: SPOTA.c.primary, c: '#fff' },
    soft:      { bg: SPOTA.c.secondarySoft, c: SPOTA.c.secondaryDark },
    softG:     { bg: SPOTA.c.primarySoft, c: SPOTA.c.primaryDark },
    softA:     { bg: SPOTA.c.accentSoft, c: '#7A5A12' },
  }[kind];
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 4,
      padding: '4px 10px', borderRadius: 999,
      background: palettes.bg, color: palettes.c,
      fontFamily: SPOTA.font.ui, fontWeight: 600, fontSize: 11.5, letterSpacing: 0.2,
      ...style,
    }}>
      {icon && <Icon name={icon} size={12} />}
      {children}
    </span>
  );
};

// Proof of Visit — píldora verde con check
const ProofOfVisit = ({ size = 'sm' }) => {
  const isLg = size === 'lg';
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 5,
      padding: isLg ? '6px 12px' : '4px 9px', borderRadius: 999,
      background: SPOTA.c.primary, color: '#fff',
      fontFamily: SPOTA.font.ui, fontWeight: 600, fontSize: isLg ? 12.5 : 11,
      boxShadow: '0 1px 3px rgba(47,111,94,0.2)',
    }}>
      <span style={{
        width: isLg ? 16 : 14, height: isLg ? 16 : 14, borderRadius: 999,
        background: '#fff', display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
      }}>
        <Icon name="check" size={isLg ? 11 : 9} color={SPOTA.c.primary} strokeWidth={3} />
      </span>
      Visitado
    </span>
  );
};

// FamaScore — variante classic (usada en cards y detalle)
const FamaScore = ({ score = 4.7, count = 256, size = 'sm', onDark = false }) => (
  <div style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}>
    <Icon name="star" size={size === 'lg' ? 18 : 14} color={SPOTA.c.accent} />
    <span style={{ fontFamily: SPOTA.font.ui, fontWeight: 700, fontSize: size === 'lg' ? 15 : 13, color: onDark ? '#fff' : SPOTA.c.text }}>
      {score.toFixed(1)}
    </span>
    <span style={{ fontFamily: SPOTA.font.ui, fontSize: size === 'lg' ? 14 : 12.5, color: onDark ? 'rgba(255,255,255,0.85)' : SPOTA.c.textSoft }}>
      ({count})
    </span>
  </div>
);

// PlaceCard — card de lugar (variante desktop con hover lift)
const PlaceCard = ({ place, onClick, saved, onSave, selected }) => {
  const [hover, setHover] = React.useState(false);
  return (
    <div
      onClick={onClick}
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{
        background: SPOTA.c.surface, borderRadius: SPOTA.radius.lg, overflow: 'hidden',
        border: `1.5px solid ${selected ? SPOTA.c.primary : SPOTA.c.lineSoft}`,
        boxShadow: hover || selected ? SPOTA.shadow.cardHover : SPOTA.shadow.card,
        cursor: 'pointer', transform: hover ? 'translateY(-2px)' : 'none',
        transition: 'transform 200ms, box-shadow 200ms, border-color 150ms',
      }}>
      <div style={{ position: 'relative', height: 170, background: SPOTA.c.lineSoft }}>
        <img src={photo(place.img, 600, 400)} alt={place.name}
          style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }} />
        {place.tag && <div style={{ position: 'absolute', top: 10, left: 10 }}><Tag kind="secondary">{place.tag}</Tag></div>}
        <button onClick={(e) => { e.stopPropagation(); onSave && onSave(); }} style={{
          position: 'absolute', top: 8, right: 8, width: 36, height: 36, borderRadius: 999,
          background: 'rgba(255,255,255,0.92)', border: 'none', cursor: 'pointer',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <Icon name={saved ? 'heartFill' : 'heart'} size={18} color={saved ? SPOTA.c.secondary : SPOTA.c.text} />
        </button>
        {place.visited && <div style={{ position: 'absolute', bottom: 10, left: 10 }}><ProofOfVisit /></div>}
        {place.benefit && <div style={{ position: 'absolute', bottom: 10, right: 10 }}><Tag kind="accent" icon="gift">{place.benefit}</Tag></div>}
      </div>
      <div style={{ padding: 14 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', gap: 8 }}>
          <h3 style={{ margin: 0, fontFamily: SPOTA.font.ui, fontWeight: 700, fontSize: 16, color: SPOTA.c.text, lineHeight: 1.2 }}>
            {place.name}
          </h3>
          <span style={{ fontFamily: SPOTA.font.ui, fontWeight: 600, fontSize: 13, color: SPOTA.c.textSoft, whiteSpace: 'nowrap' }}>
            {place.price}
          </span>
        </div>
        <p style={{ margin: '4px 0 8px', fontFamily: SPOTA.font.ui, fontSize: 13, color: SPOTA.c.textSoft }}>
          {place.cat} · {place.hood}
        </p>
        <FamaScore score={place.score} count={place.reviews} />
        <AffineRow place={place} />
      </div>
    </div>
  );
};

// AffineRow — chip cualitativo de match + mini-avatares de reseñadores afines.
// Es la traducción humana del Fama Score predictivo. Espejo del componente mobile.
const AffineRow = ({ place }) => {
  const reviewers = (window.AFFINE_REVIEWERS && window.AFFINE_REVIEWERS[place.id]) || [];
  const aff = window.affinityLabel ? window.affinityLabel(place.affinity) : null;
  if (!aff && !reviewers.length) return null;
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 8, flexWrap: 'wrap' }}>
      {aff && (
        <span style={{
          display: 'inline-flex', alignItems: 'center', gap: 4,
          padding: '3px 8px', borderRadius: 999,
          background: aff.tone === 'primary' ? 'rgba(47, 111, 94, 0.10)' : SPOTA.c.bgAlt,
          border: `1px solid ${aff.tone === 'primary' ? 'rgba(47, 111, 94, 0.25)' : SPOTA.c.lineSoft}`,
          fontFamily: SPOTA.font.ui, fontSize: 11, fontWeight: 600,
          color: aff.tone === 'primary' ? SPOTA.c.primary : SPOTA.c.textSoft,
        }}>
          <Icon name="sparkles" size={10} color={aff.tone === 'primary' ? SPOTA.c.primary : SPOTA.c.textSoft} />
          {aff.label}
        </span>
      )}
      {reviewers.length > 0 && (
        <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
          <div style={{ display: 'inline-flex' }}>
            {reviewers.slice(0, 3).map((name, i) => (
              <div key={name} style={{ marginLeft: i === 0 ? 0 : -7, border: `2px solid ${SPOTA.c.surface}`, borderRadius: 999, lineHeight: 0 }}>
                <img src={avatar(name, 36)} alt={name} style={{ width: 18, height: 18, borderRadius: 999, display: 'block' }} />
              </div>
            ))}
          </div>
          <span style={{ fontFamily: SPOTA.font.ui, fontSize: 11.5, color: SPOTA.c.textSoft }}>
            <span style={{ fontFamily: SPOTA.font.serif, fontStyle: 'italic' }}>gente como vos</span>
          </span>
        </div>
      )}
    </div>
  );
};

// IntentChips — visualiza las dimensiones interpretadas por interpretQuery.
const INTENT_DIMENSIONS = [
  { key: 'ambiente',  prefix: 'ambiente', icon: 'sparkles' },
  { key: 'compania',  prefix: 'con',      icon: 'users'    },
  { key: 'momento',   prefix: 'cuándo',   icon: 'calendar' },
  { key: 'categoria', prefix: 'tipo',     icon: 'compass'  },
  { key: 'zona',      prefix: 'en',       icon: 'map'      },
];

const IntentChips = ({ intents, label = 'Entendí esto:' }) => {
  const present = INTENT_DIMENSIONS.filter(d => intents && intents[d.key]);
  if (!present.length) return null;
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap' }}>
      <span style={{ fontFamily: SPOTA.font.serif, fontStyle: 'italic', fontSize: 13, color: SPOTA.c.textSoft }}>
        {label}
      </span>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
        {present.map(d => (
          <span key={d.key} style={{
            display: 'inline-flex', alignItems: 'center', gap: 6,
            padding: '6px 12px', borderRadius: 999,
            background: SPOTA.c.surface, border: `1px solid ${SPOTA.c.line}`,
            fontFamily: SPOTA.font.ui, fontSize: 13,
          }}>
            <Icon name={d.icon} size={12} color={SPOTA.c.primary} />
            <span style={{ fontFamily: SPOTA.font.serif, fontStyle: 'italic', color: SPOTA.c.textSoft }}>
              {d.prefix}
            </span>
            <strong style={{ fontWeight: 600, color: SPOTA.c.text }}>
              {intents[d.key]}
            </strong>
          </span>
        ))}
      </div>
    </div>
  );
};

Object.assign(window, { Icon, SpotaLogo, Btn, Avatar, Tag, ProofOfVisit, FamaScore, PlaceCard,
                        AffineRow, IntentChips, INTENT_DIMENSIONS });
</script>

// SearchResults desktop — D12: lista (60%) + mapa (40%) simultáneos.
// Header con input editable y refinable. Loading narrativo al entrar y al refinar.
// Espejo conceptual del SearchResults mobile, adaptado al canvas desktop.
const ScreenSearchResults = ({ nav, params }) => {
  const initialQuery = (params && params.query) || 'algo tranquilo en Palermo con una amiga el sábado';
  const [activeQuery, setActiveQuery] = React.useState(initialQuery);
  const [draftQuery, setDraftQuery] = React.useState(initialQuery);
  const [loading, setLoading] = React.useState(true);
  const [selectedPin, setSelectedPin] = React.useState('p1');
  const intents = window.interpretQuery(activeQuery);

  React.useEffect(() => {
    setLoading(true);
    const t = setTimeout(() => setLoading(false), 750);
    return () => clearTimeout(t);
  }, [activeQuery]);

  const submit = () => {
    const q = (draftQuery || '').trim();
    if (!q || q === activeQuery) return;
    setActiveQuery(q);
  };

  return (
    <section style={{ paddingTop: 8 }}>
      {/* Header refinable */}
      <div style={{ marginBottom: 18, display: 'flex', alignItems: 'center', gap: 12 }}>
        <button onClick={() => nav('home')} title="Volver" style={{
          width: 40, height: 40, borderRadius: 999, border: `1px solid ${SPOTA.c.line}`,
          background: SPOTA.c.surface, cursor: 'pointer',
          display: 'inline-flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
        }}>
          <Icon name="arrowLeft" size={18} color={SPOTA.c.text} />
        </button>
        <div style={{
          flex: 1, display: 'flex', alignItems: 'center', gap: 12,
          padding: '0 18px', height: 56,
          background: '#FFFFFF', borderRadius: 999,
          border: `1.5px solid ${SPOTA.c.primary}`,
          boxShadow: '0 6px 18px rgba(47, 111, 94, 0.10)',
        }}>
          <Icon name="search" size={18} color={SPOTA.c.primary} />
          <input
            value={draftQuery}
            onChange={(e) => setDraftQuery(e.target.value)}
            onKeyDown={(e) => { if (e.key === 'Enter') submit(); }}
            style={{
              flex: 1, border: 'none', outline: 'none', background: 'transparent',
              fontFamily: SPOTA.font.ui, fontSize: 15, color: SPOTA.c.text,
            }}
          />
          {draftQuery && draftQuery !== activeQuery && (
            <button onClick={submit} style={{
              border: 'none', cursor: 'pointer',
              background: SPOTA.c.primary, color: '#fff',
              fontFamily: SPOTA.font.ui, fontSize: 12.5, fontWeight: 600,
              padding: '7px 14px', borderRadius: 999,
            }}>Refinar</button>
          )}
        </div>
      </div>

      {loading ? (
        <ConciergeLoadingDesktop intents={intents} />
      ) : (
        <React.Fragment>
          {/* Chips de intención + contador */}
          <div style={{ marginBottom: 18, display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 16, flexWrap: 'wrap' }}>
            <IntentChips intents={intents} />
            <p style={{ margin: 0, fontFamily: SPOTA.font.ui, fontSize: 13.5, color: SPOTA.c.textSoft }}>
              <strong style={{ color: SPOTA.c.text }}>{PLACES.length} lugares</strong> por afinidad
            </p>
          </div>

          {/* D12 — lista 60% + mapa 40% sticky */}
          <div style={{ display: 'grid', gridTemplateColumns: 'minmax(0, 1.4fr) minmax(0, 1fr)', gap: 24, alignItems: 'start' }}>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 16 }}>
              {PLACES.map(p => (
                <PlaceCard key={p.id} place={p}
                  selected={selectedPin === p.id}
                  onClick={() => nav('placeDetail', { id: p.id })} />
              ))}
            </div>
            <div style={{ position: 'sticky', top: 96, height: 'calc(100vh - 120px)' }}>
              <MapView selected={selectedPin} onSelect={setSelectedPin} />
            </div>
          </div>
        </React.Fragment>
      )}
    </section>
  );
};

// ConciergeLoadingDesktop — pausa narrativa entre submit y resultados.
const ConciergeLoadingDesktop = ({ intents }) => {
  const dims = Object.values(intents || {}).filter(Boolean);
  return (
    <div style={{
      minHeight: 420,
      display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
      padding: '60px 24px', gap: 18,
    }}>
      <div style={{ display: 'inline-flex', gap: 8 }}>
        {[0, 1, 2].map(i => (
          <span key={i} style={{
            width: 10, height: 10, borderRadius: 999, background: SPOTA.c.primary,
            opacity: 0.35, animation: `pulse 1.2s ease-in-out ${i * 0.15}s infinite`,
          }} />
        ))}
      </div>
      <p style={{ margin: 0, textAlign: 'center', fontFamily: SPOTA.font.ui, fontSize: 17, color: SPOTA.c.text }}>
        <span style={{ fontFamily: SPOTA.font.serif, fontStyle: 'italic' }}>Leyendo</span> tus gustos…
      </p>
      {dims.length > 0 && (
        <p style={{ margin: 0, textAlign: 'center', fontFamily: SPOTA.font.ui, fontSize: 13.5, color: SPOTA.c.textSoft, maxWidth: 420, lineHeight: 1.5 }}>
          Cruzando {dims.join(' · ')} con tu Fama Score
        </p>
      )}
    </div>
  );
};

Object.assign(window, { ScreenDiscover, ScreenSearchResults });
</script>

<script type="text/babel" data-presets="react">
// Stepper horizontal para wizards desktop. 3 segmentos con número, label y línea conectiva.
const Stepper = ({ steps, current }) => (
  <div style={{ display: 'flex', alignItems: 'center', gap: 12, maxWidth: 720, margin: '0 auto 32px' }}>
    {steps.map((s, i) => {
      const done = i + 1 < current;
      const active = i + 1 === current;
      return (
        <React.Fragment key={s}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <div style={{
              width: 32, height: 32, borderRadius: 999,
              background: done || active ? SPOTA.c.primary : SPOTA.c.surface,
              border: `1.5px solid ${done || active ? SPOTA.c.primary : SPOTA.c.line}`,
              color: done || active ? '#fff' : SPOTA.c.textMuted,
              display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
              fontFamily: SPOTA.font.ui, fontWeight: 700, fontSize: 13.5,
            }}>
              {done ? <Icon name="check" size={14} color="#fff" strokeWidth={3} /> : i + 1}
            </div>
            <span style={{
              fontFamily: SPOTA.font.ui, fontWeight: active ? 700 : 500, fontSize: 13.5,
              color: active ? SPOTA.c.text : SPOTA.c.textSoft, whiteSpace: 'nowrap',
            }}>{s}</span>
          </div>
          {i < steps.length - 1 && (
            <div style={{ flex: 1, height: 2, background: done ? SPOTA.c.primary : SPOTA.c.line, borderRadius: 999 }} />
          )}
        </React.Fragment>
      );
    })}
  </div>
);

Object.assign(window, { Stepper });
</script>

        )}

    </section>
  );
};

const PaywallVariantA = ({ amount, onCancel, onConfirm }) => {

        <div style={{ display: 'flex', gap: 8, marginBottom: 10 }}>

          {inputBox('Número de tarjeta (16 dígitos)', card.numero, (v) => setC('numero', v), 'wallet')}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
            {inputBox('Vencimiento (MM/AAAA)', card.venc, (v) => setC('venc', v))}
            {inputBox('Código (3 o 4 dígitos)', card.cvv, (v) => setC('cvv', v))}

        </div>

        <h3 style={{ margin: '6px 0 8px', fontFamily: SPOTA.font.ui, fontWeight: 700, fontSize: 14.5, color: SPOTA.c.text }}>Facturación</h3>

        </div>

          <span style={{ fontFamily: SPOTA.font.ui, fontSize: 13, color: SPOTA.c.text }}>Guardar medio y datos de facturación para próximas veces.</span>

// CU-001-001 §3.11 — Registrar cuenta con fecha de nacimiento + validación 18 años
// + aceptación T&C. CTA encadena con verifyCode antes de preferences.
function ageFromBirthAR(s) {
  const m = (s || '').match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if (!m) return null;
  const d = parseInt(m[1], 10), mo = parseInt(m[2], 10) - 1, y = parseInt(m[3], 10);
  const dt = new Date(y, mo, d);
  if (dt.getFullYear() !== y || dt.getMonth() !== mo || dt.getDate() !== d) return null;
  const today = new Date();
  let age = today.getFullYear() - y;
  const before = today.getMonth() < mo || (today.getMonth() === mo && today.getDate() < d);
  if (before) age -= 1;
  return age;
}

        <div>

// CU-001-002 §3.1 — Verificación por código enviado al email (6 dígitos)
const ScreenVerifyCode = ({ nav, params }) => {
  const [digits, setDigits] = React.useState(['','','','','','']);
  const [state, setState] = React.useState('idle');
  const [remaining, setRemaining] = React.useState(300);
  // CU-001-001 §3.11 paso 21: canónico = 60s entre reenvíos.
  const [resendIn, setResendIn] = React.useState(60);
  const [attempts, setAttempts] = React.useState(0);
  const refs = React.useRef([]);

  React.useEffect(() => {
    if (state === 'blocked') return;
    const t = setInterval(() => {
      setRemaining(r => Math.max(0, r - 1));
      setResendIn(r => Math.max(0, r - 1));
    }, 1000);
    return () => clearInterval(t);
  }, [state]);

  React.useEffect(() => {
    if (remaining === 0 && state !== 'blocked') setState('expired');
  }, [remaining, state]);

  const onDigit = (i, v) => {
    if (state === 'expired' || state === 'blocked') return;
    const digit = (v || '').replace(/[^0-9]/g, '').slice(-1);
    const next = [...digits];
    next[i] = digit;
    setDigits(next);
    if (digit && i < 5) refs.current[i + 1]?.focus();
  };

  const filled = digits.every(d => d.length === 1);
  const value = digits.join('');

  const submit = () => {
    if (value === '000000') {
      const a = attempts + 1;
      setAttempts(a);
      if (a >= 3) setState('blocked'); else setState('invalid');
    } else {
      // CU-001-001 §3.11 paso 22: tras verificar, alta nueva va al wizard de preferencias;
      // login va a Home.
      const from = params && params.from;
      if (from === 'register') nav('preferences', { mode: 'onboarding' });
      else nav('home');
    }
  };

  const resend = () => {
    if (resendIn > 0) return;
    setDigits(['','','','','','']);
    setState('idle');
    setRemaining(300);
    setResendIn(60);
  };

  const mm = String(Math.floor(remaining / 60)).padStart(2, '0');
  const ss = String(remaining % 60).padStart(2, '0');

  const message = {
    idle: 'Te enviamos un código de 6 dígitos al email registrado. Vence en 5 minutos.',
    invalid: 'El código no coincide. Volvé a ingresarlo o pedí uno nuevo.',
    expired: 'El código venció. Pedí uno nuevo para continuar.',
    blocked: 'Cuenta bloqueada por intentos fallidos. Probá más tarde o recuperá tu contraseña.',
  }[state];
  const messageColor = state === 'idle' ? SPOTA.c.textSoft : SPOTA.c.danger;

  return (
    <AuthCard>
      <SpotaLogo size={28} color={SPOTA.c.secondary} />
      <div style={{ marginTop: 18, display: 'flex', alignItems: 'center', gap: 12 }}>
        <div style={{ width: 48, height: 48, borderRadius: 12, background: SPOTA.c.primarySoft, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <Icon name="shield" size={24} color={SPOTA.c.primary} />
        </div>
        <div>
          <h1 style={{ margin: 0, fontFamily: SPOTA.font.ui, fontSize: 24, fontWeight: 700, color: SPOTA.c.text, letterSpacing: -0.4 }}>
            Verificá tu acceso
          </h1>
          <p style={{ margin: '2px 0 0', fontFamily: SPOTA.font.ui, fontSize: 13, color: messageColor }}>{message}</p>
        </div>
      </div>
      <div style={{ display: 'flex', gap: 8, marginTop: 22, marginBottom: 10 }}>
        {digits.map((d, i) => (
          <input key={i} ref={el => refs.current[i] = el}
            value={d} onChange={(e) => onDigit(i, e.target.value)}
            inputMode="numeric" maxLength={1}
            disabled={state === 'expired' || state === 'blocked'}
            style={{
              flex: 1, minWidth: 0, width: 0, height: 56, padding: 0,
              textAlign: 'center', borderRadius: 12,
              border: `1.5px solid ${state === 'invalid' ? SPOTA.c.danger : (d ? SPOTA.c.primary : SPOTA.c.line)}`,
              background: state === 'blocked' ? SPOTA.c.lineSoft : SPOTA.c.bg,
              fontFamily: SPOTA.font.ui, fontWeight: 700, fontSize: 22, color: SPOTA.c.text, outline: 'none',
            }}
          />
        ))}
      </div>
      <p style={{ margin: '0 0 14px', fontFamily: SPOTA.font.ui, fontSize: 11.5, fontStyle: 'italic', color: SPOTA.c.textMuted }}>
        Tip prototipo: ingresá <strong style={{ fontStyle: 'normal' }}>123456</strong> para pasar · <strong style={{ fontStyle: 'normal' }}>000000</strong> simula código inválido.
      </p>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <span style={{ fontFamily: SPOTA.font.ui, fontSize: 13, color: SPOTA.c.textSoft }}>
          {state === 'expired' ? 'Código vencido' : state === 'blocked' ? 'Cuenta bloqueada' : `Vigente: ${mm}:${ss}`}
        </span>
        <button onClick={resend} disabled={resendIn > 0 || state === 'blocked'} style={{
          border: 'none', background: 'transparent',
          cursor: (resendIn > 0 || state === 'blocked') ? 'not-allowed' : 'pointer',
          fontFamily: SPOTA.font.ui, fontWeight: 700, fontSize: 13,
          color: (resendIn > 0 || state === 'blocked') ? SPOTA.c.textMuted : SPOTA.c.primary,
        }}>
          {resendIn > 0 && state !== 'blocked' ? `Reenviar (${resendIn}s)` : 'Reenviar código'}
        </button>
      </div>
      <div style={{ marginTop: 22, display: 'flex', flexDirection: 'column', gap: 10 }}>
        <Btn variant="primary" size="lg" full disabled={!filled || state === 'expired' || state === 'blocked'} onClick={submit}>
          Verificar y continuar
        </Btn>
        {state === 'blocked' && (
          <Btn variant="ghost" size="md" full onClick={() => nav('recover')}>Recuperar contraseña</Btn>
        )}
      </div>
      <p style={{ margin: '18px 0 0', fontFamily: SPOTA.font.ui, fontSize: 12.5, color: SPOTA.c.textMuted, textAlign: 'center' }}>
        <a onClick={() => nav('login')} style={{ color: SPOTA.c.primary, fontWeight: 700, cursor: 'pointer' }}>Volver al login</a>
      </p>
    </AuthCard>
  );
};

};

// CU-09: Mis experiencias
// CU-003-003 §3.2 — visibilidades canónicas con set de 3 opciones

const visMeta = (v) => VISIBILITY_OPTIONS.find(o => o.id === v) || VISIBILITY_OPTIONS[0];
const ScreenMyExperiences = ({ nav }) => {

    { id: 'e2', place: PLACES[5], score: 4, text: 'Buen lugar para una copa de vino tranquilo después del laburo. Mozo atento, carta corta y bien curada.', date: 'la semana pasada', visibility: 'public', likes: 12 },
    { id: 'e3', place: PLACES[2], score: 5, text: 'Una librería preciosa, me quedé toda la tarde leyendo en el sillón del fondo.', date: 'hace 2 semanas', visibility: 'private', likes: 0 },
  ]);
  const [editing, setEditing] = React.useState(null);
  const openEdit = (id) => setEditing({ id, next: myExp.find(e => e.id === id).visibility });
  const confirmEdit = () => {
    if (!editing) return;

    { id: 'pd1', place: PLACES[3], date: 'ayer' },

  const [tab, setTab] = React.useState('all');
  const counts = {
    all: myExp.length,
    pending: pending.length,
    public: myExp.filter(e => e.visibility === 'public').length,
    private: myExp.filter(e => e.visibility === 'private').length,
  };
  const visible = tab === 'pending' ? [] : myExp.filter(e => tab === 'all' || e.visibility === tab);

  return (
    <section>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 16, fontFamily: SPOTA.font.ui, fontSize: 13, color: SPOTA.c.textSoft }}>

          <Icon name="arrowLeft" size={14} /> Perfil
        </button>
        <span style={{ color: SPOTA.c.textMuted }}>/</span>
        <span style={{ color: SPOTA.c.text, fontWeight: 600 }}>Mis experiencias</span>
      </div>

      {/* Hero con Fama Score */}

      </div>

      {/* Contenido del tab */}
      {tab === 'pending' ? (
        <>

          <div style={{ width: 64, height: 64, borderRadius: 999, background: SPOTA.c.bgAlt, margin: '0 auto 14px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <Icon name="compass" size={28} color={SPOTA.c.textMuted} />

          <Btn variant="primary" icon="compass" onClick={() => nav('home')}>Ir a Descubrir</Btn>

      ) : (
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(420px, 1fr))', gap: 16 }}>
          {visible.map(e => {
            const meta = visMeta(e.visibility);

      {/* Modal de "Cambiar visibilidad" — CU-003-003 §3.2 pasos 5-11 */}
      {editing && (() => {
        const current = myExp.find(e => e.id === editing.id);
        const currentMeta = visMeta(current.visibility);
        const nextMeta = visMeta(editing.next);
        const sameAsCurrent = editing.next === current.visibility;

        return (
          <div onClick={() => setEditing(null)} style={{
            position: 'fixed', inset: 0, background: 'rgba(43,37,35,0.55)',

              background: SPOTA.c.bg, width: 'min(520px, 100%)',
              borderRadius: 18, padding: '24px 28px', boxShadow: SPOTA.shadow.pop,

              <h2 style={{ margin: '0 0 6px', fontFamily: SPOTA.font.ui, fontWeight: 700, fontSize: 22, color: SPOTA.c.text }}>Cambiar visibilidad</h2>
              <p style={{ margin: '0 0 18px', fontFamily: SPOTA.font.ui, fontSize: 13.5, color: SPOTA.c.textSoft }}>

              </p>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 14 }}>
                {VISIBILITY_OPTIONS.map(o => {
                  const on = editing.next === o.id;
                  return (
                    <button key={o.id} onClick={() => setEditing(s => ({ ...s, next: o.id }))} style={{
                      display: 'flex', alignItems: 'center', gap: 12, padding: '14px 16px', borderRadius: 12,
                      background: on ? SPOTA.c.primarySoft : SPOTA.c.surface,
                      border: `1.5px solid ${on ? SPOTA.c.primary : SPOTA.c.lineSoft}`,
                      cursor: 'pointer', textAlign: 'left',
                    }}>
                      <Icon name={o.icon} size={20} color={on ? SPOTA.c.primary : SPOTA.c.textSoft} />
                      <span style={{ flex: 1, fontFamily: SPOTA.font.ui, fontWeight: on ? 700 : 600, fontSize: 14.5, color: SPOTA.c.text }}>{o.label}</span>
                      {on && <Icon name="checkCircle" size={20} color={SPOTA.c.primary} />}
                    </button>
                  );
                })}
              </div>
              {turningPrivate && !sameAsCurrent && (
                <p style={{ margin: '0 0 16px', fontFamily: SPOTA.font.ui, fontSize: 13, color: SPOTA.c.textSoft, lineHeight: 1.5, padding: 12, background: SPOTA.c.surface, borderRadius: 10, border: `1px solid ${SPOTA.c.lineSoft}` }}>
                  Al pasar a {nextMeta.label}, la reseña deja de aparecer en los feeds de la comunidad.
                </p>
              )}
              <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 10 }}>
                <Btn variant="ghost" onClick={() => setEditing(null)}>Cancelar</Btn>
                <Btn variant="primary" disabled={sameAsCurrent} icon="check" onClick={confirmEdit}>
                  {sameAsCurrent ? 'Misma visibilidad' : 'Confirmar'}
                </Btn>
              </div>
            </div>
          </div>
        );
      })()}
    </section>
  );
};

Object.assign(window, { ScreenPreferences, ScreenMyExperiences });

const SCREEN_META = {};

  collectionDetail: ScreenCollectionDetail,

  preferences:      ScreenPreferences,

};

// Mapping de pantalla a ítem del nav (para resaltar el tab activo cuando estás en una pantalla hija).
const NAV_PARENT = {
  searchResults: 'home',
  placeDetail: 'home',
  collectionsFilter: 'collections',
  collectionDetail: 'collections',
  createCollection: 'collections',
  createPlan: 'plans',
  planVote: 'plans',
  planClose: 'plans',
  hostMarketplace: 'plans',
  createOffer: 'plans',
  hireHost: 'plans',
  registerHost: 'profile',
  hostDashboard: 'profile',
  preferences: 'profile',
  credentials: 'profile',
  editProfile: 'profile',
  myExperiences: 'profile',
};

// Pantallas del panel de Negocios — usan BizFrame en lugar del DesktopFrame.
const BIZ_SCREENS = new Set(['bizHome', 'claimPlace', 'bizBenefits', 'bizCampaign', 'bizInsights', 'bizInsightsResult', 'bizSubscribe']);
// Pantallas sin frame (entry sin auth, full-bleed).
const NO_FRAME_SCREENS = new Set(['bizRegister', 'welcome', 'login', 'register', 'recover', 'resetPassword', 'verifyCode']);

function App() {
  // Initial state alineado con mobile (D15): la primer pantalla es `login`, no `home`.
  // `welcome` queda en el código (preservado por D16) pero sin entry points — no es un CU canónico.
  const [current, setCurrent] = React.useState('login');
  const [params, setParams] = React.useState({});
  const nav = (id, p = {}) => { setCurrent(id); setParams(p); window.scrollTo(0, 0); };
  const Screen = SCREENS[current] || ScreenSoon;
  const navHighlight = NAV_PARENT[current] || current;

  let content;
  if (NO_FRAME_SCREENS.has(current)) {
    content = <Screen current={current} nav={nav} params={params} />;
  } else if (BIZ_SCREENS.has(current)) {
    content = (
      <BizFrame current={current} nav={nav}>
        <Screen current={current} nav={nav} params={params} />
      </BizFrame>
    );
  } else {
    content = (
      <DesktopFrame current={navHighlight} nav={nav}>
        <Screen current={current} nav={nav} params={params} />
      </DesktopFrame>
    );
  }

  return <SmallViewportGuard>{content}</SmallViewportGuard>;
}

const root = ReactDOM.createRoot(document.getElementById('app'));
root.render(<App />);
</script>
