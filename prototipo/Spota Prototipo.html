<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Fraunces:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: "DM Sans", system-ui, sans-serif; background: #1a1614; color: #f5ede0; -webkit-font-smoothing: antialiased; }

    background:
      radial-gradient(1200px 800px at 20% 10%, #2a201c 0%, transparent 60%),
      radial-gradient(1000px 700px at 90% 90%, #1f2a26 0%, transparent 60%),
      #14110f;
    min-height: 100vh;
  }
  #app { width: 100%; min-height: 100vh; }
  button { font-family: inherit; }
  input, textarea { font-family: inherit; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  .placeholder-rotate { animation: fadeIn 250ms; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<!-- ios-frame.jsx -->
<script type="text/babel" data-presets="react">

// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports: IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar (absolute) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto', display: 'flex', flexDirection: 'column' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      {/* liquid glass bg — same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />

      {/* autocorrect bar */}
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>

      {/* key layout */}
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

Object.assign(window, {
  IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard,
});

</script>

//         Hello

//           <TweakSection label="Typography" />

//                        onChange={(v) => setTweak('fontSize', v)} />
//           <TweakRadio  label="Density" value={t.density}
//                        options={['compact', 'regular', 'comfy']}
//                        onChange={(v) => setTweak('density', v)} />
//           <TweakSection label="Theme" />

// ─────────────────────────────────────────────────────────────────────────────

const __TWEAKS_STYLE = `
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;
    max-height:calc(100vh - 32px);display:flex;flex-direction:column;
    background:rgba(250,249,247,.78);color:#29261b;
    -webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);
    border:.5px solid rgba(255,255,255,.6);border-radius:14px;
    box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);
    font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}
  .twk-hd{display:flex;align-items:center;justify-content:space-between;
    padding:10px 8px 10px 14px;cursor:move;user-select:none}
  .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}
  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);
    width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
  .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;

    scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent}
  .twk-body::-webkit-scrollbar{width:8px}
  .twk-body::-webkit-scrollbar-track{background:transparent;margin:2px}
  .twk-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px;
    border:2px solid transparent;background-clip:content-box}
  .twk-body::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.25);
    border:2px solid transparent;background-clip:content-box}
  .twk-row{display:flex;flex-direction:column;gap:5px}
  .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;
    color:rgba(41,38,27,.72)}
  .twk-lbl>span:first-child{font-weight:500}
  .twk-val{color:rgba(41,38,27,.5);font-variant-numeric:tabular-nums}

  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:rgba(41,38,27,.45);padding:10px 0 0}
  .twk-sect:first-child{padding-top:0}

  .twk-field{appearance:none;width:100%;height:26px;padding:0 8px;
    border:.5px solid rgba(0,0,0,.1);border-radius:7px;
    background:rgba(255,255,255,.6);color:inherit;font:inherit;outline:none}
  .twk-field:focus{border-color:rgba(0,0,0,.25);background:rgba(255,255,255,.85)}
  select.twk-field{padding-right:22px;

  .twk-swatch::-moz-color-swatch{border:0;border-radius:5.5px}
`;

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

// Etiqueta cualitativa de afinidad sobre PLACE.affinity (numérico 0-100).
function affinityLabel(score) {
  if (score == null) return null;
  if (score >= 88) return { label: 'Alto match',    tone: 'primary' };
  if (score >= 78) return { label: 'Buen match',    tone: 'soft'    };
  return null;
}

// ─────────────────────────────────────────────────────────────
// interpretQuery — heurística que extrae dimensiones de una query libre.
// Es deliberadamente simple: el prototipo demuestra el patrón, no el modelo.
// Devuelve { ambiente?, compania?, momento?, categoria?, zona? } con cada
// dimensión como string (lo que se mostrará en los chips).
// ─────────────────────────────────────────────────────────────
function interpretQuery(text) {
  if (!text) return {};
  const t = text.toLowerCase();
  const out = {};

  // ambiente — incluye también micro-intenciones (charlar, trabajar)
  const ambiente = [
    { kw: ['tranquilo', 'tranqui', 'relajado', 'silencioso', 'tranquila'], v: 'tranquilo' },
    { kw: ['romántico', 'romántica', 'romantico', 'romantica', 'íntimo', 'intimo'], v: 'romántico' },
    { kw: ['movido', 'fiesta', 'after', 'after office', 'ruidoso'],     v: 'movido' },
    { kw: ['charlar', 'conversar'],                                       v: 'charlar' },
    { kw: ['trabajar', 'wifi', 'laburar', 'remoto'],                      v: 'trabajar' },
    { kw: ['económico', 'economico', 'barato', 'low cost'],               v: 'económico' },
  ];
  for (const a of ambiente) if (a.kw.some(k => t.includes(k))) { out.ambiente = a.v; break; }

  // compañía — el plural va antes del singular para que "amigos" no matchee "amigo"
  const compania = [
    { kw: ['con amigas'],                              v: 'con amigas' },
    { kw: ['con una amiga', 'con amiga', 'una amiga'], v: 'con amiga'  },
    { kw: ['con amigos'],                              v: 'con amigos' },
    { kw: ['con un amigo', 'con amigo', 'un amigo'],   v: 'con amigo'  },
    { kw: ['en pareja', 'mi pareja', 'cita'],          v: 'pareja'     },
    { kw: ['en familia', 'con mi familia'],            v: 'familia'    },
    { kw: ['en grupo', 'grupo'],                       v: 'grupo'      },
    { kw: ['solo', 'sola'],                            v: 'solo'       },
  ];
  for (const c of compania) if (c.kw.some(k => t.includes(k))) { out.compania = c.v; break; }

  // momento
  const momento = [
    { kw: ['hoy'],                          v: 'hoy'      },
    { kw: ['mañana', 'manana'],             v: 'mañana'   },
    { kw: ['esta noche', 'a la noche'],     v: 'esta noche' },
    { kw: ['esta tarde', 'a la tarde'],     v: 'esta tarde' },
    { kw: ['lunes'],   v: 'lunes'   },
    { kw: ['martes'],  v: 'martes'  },
    { kw: ['miércoles', 'miercoles'], v: 'miércoles' },
    { kw: ['jueves'],  v: 'jueves'  },
    { kw: ['viernes'], v: 'viernes' },
    { kw: ['sábado', 'sabado'], v: 'sábado' },
    { kw: ['domingo'], v: 'domingo' },
    { kw: ['fin de semana', 'finde'], v: 'fin de semana' },
  ];
  for (const m of momento) if (m.kw.some(k => t.includes(k))) { out.momento = m.v; break; }

  // categoría
  const categoria = [
    { kw: ['café', 'cafe', 'cafés', 'cafes', 'cafetería', 'cafeteria'], v: 'cafés' },
    { kw: ['cena', 'cenar', 'comer', 'restaurante', 'comida'],          v: 'comida' },
    { kw: ['bar', 'bares', 'tragos', 'cerveza', 'cervecería'],          v: 'bares' },
    { kw: ['cultura', 'museo', 'librería', 'libreria', 'cine', 'arte'], v: 'cultura' },
    { kw: ['parque', 'aire libre', 'caminar', 'paseo'],                 v: 'aire libre' },
  ];
  for (const c of categoria) if (c.kw.some(k => t.includes(k))) { out.categoria = c.v; break; }

  // zona — barrios típicos del prototipo
  const zonas = ['Palermo', 'San Telmo', 'Villa Crespo', 'Colegiales', 'Recoleta',
                 'Caballito', 'Chacarita', 'Boedo', 'Centro', 'Belgrano'];
  for (const z of zonas) if (t.includes(z.toLowerCase())) { out.zona = z; break; }

  return out;
}

// ─────────────────────────────────────────────────────────────
// CU-004-002 + CU-007-004/005 — Sets unificados de Ámbito (Colecciones)
// y Actividad (Colecciones + Insights + Campañas). Mantener acá como
// fuente única para evitar drift entre pantallas.
// ─────────────────────────────────────────────────────────────
const SCOPE_OPTIONS = ['Mías', 'Guardadas', 'De la comunidad', 'Todas'];
const ACTIVITY_OPTIONS = ['Café', 'Cena', 'Trago', 'Arte y cultura',
  'Trabajo nómade', 'Tarde con amigos', 'Cita romántica', 'Deporte', 'Todas'];

// Mapeo place.cat → actividad (para indicador "X de Y matchean")
const CAT_TO_ACTIVITY = {
  'Cafetería': 'Café',
  'Restaurante': 'Cena',
  'Parrilla': 'Cena',
  'Bar': 'Trago',
  'Vinos': 'Trago',
  'Cervecería': 'Trago',
  'Cultura': 'Arte y cultura',
  'Recorrido': 'Arte y cultura',
  'Mercado': 'Arte y cultura',
  'Heladería': 'Tarde con amigos',
  'Aire libre': 'Deporte',
  'Bienestar': 'Deporte',
};
function matchesActivity(place, activity) {
  if (!activity || activity === 'Todas') return true;
  return CAT_TO_ACTIVITY[place.cat] === activity;
}
// Mock determinista de cuántos lugares de cada colección matchean la actividad.
function collectionMatchCount(c, activity) {
  if (!activity || activity === 'Todas') return null;
  const seed = Math.abs(hashStr(c.id + ':' + activity));
  return Math.max(1, seed % Math.max(2, c.count));
}
// Mock de colecciones guardadas por el usuario actual.
const SAVED_COLLECTION_IDS = new Set(['c1', 'c4']);
function collectionIsSaved(c) { return SAVED_COLLECTION_IDS.has(c.id); }
function collectionIsMine(c) { return c.by === 'Vos'; }
function collectionInScope(c, scope) {
  if (!scope || scope === 'Todas') return true;
  if (scope === 'Mías') return collectionIsMine(c);
  if (scope === 'Guardadas') return collectionIsSaved(c);
  if (scope === 'De la comunidad') return !collectionIsMine(c);
  return true;
}

Object.assign(window, { PLACES, REVIEWS, HOSTS, COLLECTIONS, PLAN_OPTIONS, CATEGORIES,
                        SEARCH_PLACEHOLDERS, AFFINE_REVIEWERS, affinityLabel, interpretQuery,
                        SCOPE_OPTIONS, ACTIVITY_OPTIONS, CAT_TO_ACTIVITY,
                        matchesActivity, collectionMatchCount, collectionIsSaved,
                        collectionIsMine, collectionInScope });

</script>

// ─────────────────────────────────────────────────────────────
// Botones
// ─────────────────────────────────────────────────────────────
const Btn = ({ children, variant = 'primary', size = 'md', onClick, full, icon, iconRight, style = {}, disabled }) => {
  const sizes = {
    sm: { h: 36, px: 14, fs: 14, r: 10 },
    md: { h: 48, px: 18, fs: 15, r: 12 },
    lg: { h: 56, px: 22, fs: 16, r: 14 },
  }[size];
  const palettes = {
    primary: { bg: SPOTA.c.primary, c: '#fff', bd: 'transparent', hover: SPOTA.c.primaryDark },
    secondary: { bg: SPOTA.c.secondary, c: '#fff', bd: 'transparent', hover: SPOTA.c.secondaryDark },
    outline: { bg: 'transparent', c: SPOTA.c.text, bd: SPOTA.c.line, hover: SPOTA.c.bgAlt },
    ghost: { bg: 'transparent', c: SPOTA.c.text, bd: 'transparent', hover: SPOTA.c.lineSoft },
    light: { bg: SPOTA.c.surface, c: SPOTA.c.text, bd: SPOTA.c.line, hover: SPOTA.c.bgAlt },
    dark: { bg: SPOTA.c.text, c: '#fff', bd: 'transparent', hover: '#000' },
  }[variant];
  const [hover, setHover] = React.useState(false);
  return (
    <button onClick={onClick} disabled={disabled}
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{
        height: sizes.h, padding: `0 ${sizes.px}px`, borderRadius: sizes.r,
        background: hover && !disabled ? palettes.hover : palettes.bg, color: palettes.c,
        border: `1px solid ${palettes.bd === 'transparent' ? 'transparent' : palettes.bd}`,
        fontFamily: SPOTA.font.ui, fontWeight: 600, fontSize: sizes.fs,
        cursor: disabled ? 'not-allowed' : 'pointer', opacity: disabled ? 0.5 : 1,
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8,
        width: full ? '100%' : 'auto', transition: 'background 120ms, transform 120ms',
        transform: hover && !disabled ? 'translateY(-1px)' : 'none',
        ...style,
      }}>
      {icon && <Icon name={icon} size={18} />}
      {children}
      {iconRight && <Icon name={iconRight} size={18} />}
    </button>
  );
};

// ─────────────────────────────────────────────────────────────
// Fama Score — 3 variantes (toggle por tweak)
// ─────────────────────────────────────────────────────────────
const FamaScore = ({ score = 4.7, count = 256, affinity = 92, variant = 'classic', size = 'sm', onDark = false }) => {
  if (variant === 'ring') {
    const r = size === 'lg' ? 22 : 14;
    const circ = 2 * Math.PI * r;
    const off = circ - (score / 5) * circ;
    return (
      <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
        <div style={{ position: 'relative', width: r * 2 + 6, height: r * 2 + 6 }}>
          <svg width={r * 2 + 6} height={r * 2 + 6}>
            <circle cx={r + 3} cy={r + 3} r={r} stroke={SPOTA.c.lineSoft} strokeWidth={3} fill="none" />
            <circle cx={r + 3} cy={r + 3} r={r} stroke={SPOTA.c.accent} strokeWidth={3} fill="none"
              strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round"
              transform={`rotate(-90 ${r + 3} ${r + 3})`} />
          </svg>
          <span style={{
            position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontFamily: SPOTA.font.ui, fontWeight: 700, fontSize: size === 'lg' ? 13 : 10, color: SPOTA.c.text,
          }}>{score.toFixed(1)}</span>
        </div>
        <span style={{ fontFamily: SPOTA.font.ui, fontSize: size === 'lg' ? 13 : 12, color: SPOTA.c.textSoft }}>
          ({count})
        </span>
      </div>
    );
  }
  if (variant === 'affinity') {
    const pct = affinity;
    return (
      <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
        <div style={{
          display: 'inline-flex', alignItems: 'center', gap: 5,
          padding: '3px 8px 3px 6px', borderRadius: 999,
          background: SPOTA.c.accentSoft, color: '#7A5A12',
          fontFamily: SPOTA.font.ui, fontWeight: 700, fontSize: size === 'lg' ? 13 : 11.5,
        }}>
          <Icon name="sparkles" size={12} color="#7A5A12" strokeWidth={2} />
          {pct}% para vos
        </div>
        <span style={{ fontFamily: SPOTA.font.ui, fontSize: 12, color: SPOTA.c.textSoft }}>
          · {score.toFixed(1)} ({count})
        </span>
      </div>
    );
  }
  // classic
  return (
    <div style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}>
      <Icon name="star" size={size === 'lg' ? 18 : 14} color={SPOTA.c.accent} />
      <span style={{ fontFamily: SPOTA.font.ui, fontWeight: 700, fontSize: size === 'lg' ? 15 : 13, color: onDark ? '#fff' : SPOTA.c.text }}>
        {score.toFixed(1)}
      </span>
      <span style={{ fontFamily: SPOTA.font.ui, fontSize: size === 'lg' ? 14 : 12.5, color: onDark ? 'rgba(255,255,255,0.85)' : SPOTA.c.textSoft }}>
        ({count})
      </span>
    </div>
  );
};

// ─────────────────────────────────────────────────────────────

const AffineRow = ({ place }) => {
  const reviewers = (window.AFFINE_REVIEWERS && window.AFFINE_REVIEWERS[place.id]) || [];

  if (!aff && !reviewers.length) return null;
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 8, flexWrap: 'wrap' }}>
      {aff && (
        <span style={{
          display: 'inline-flex', alignItems: 'center', gap: 4,
          padding: '3px 8px', borderRadius: 999,
          background: aff.tone === 'primary' ? 'rgba(47, 111, 94, 0.10)' : SPOTA.c.bgAlt || '#F5EDE0',
          border: `1px solid ${aff.tone === 'primary' ? 'rgba(47, 111, 94, 0.25)' : SPOTA.c.lineSoft}`,
          fontFamily: SPOTA.font.ui, fontSize: 11, fontWeight: 600,
          color: aff.tone === 'primary' ? SPOTA.c.primary : SPOTA.c.textSoft,
        }}>
          <Icon name="sparkles" size={10} color={aff.tone === 'primary' ? SPOTA.c.primary : SPOTA.c.textSoft} />

        </span>
      )}
      {reviewers.length > 0 && (
        <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, minWidth: 0 }}>

            {reviewers.slice(0, 3).map((name, i) => (

            <span style={{ fontFamily: SPOTA.font.serif, fontStyle: 'italic' }}>gente como vos</span>

        </div>
      )}
    </div>
  );
};

// ─────────────────────────────────────────────────────────────
// IntentChips — visualiza las dimensiones interpretadas por interpretQuery.
// Cada chip lleva un microprefijo en Fraunces italic (la dimensión) y el
// valor en DM Sans semibold. Es informativo, no editable.
// ─────────────────────────────────────────────────────────────
const INTENT_DIMENSIONS = [
  { key: 'ambiente',  prefix: 'ambiente',  icon: 'sparkles' },
  { key: 'compania',  prefix: 'con',       icon: 'users'    },
  { key: 'momento',   prefix: 'cuándo',    icon: 'calendar' },
  { key: 'categoria', prefix: 'tipo',      icon: 'compass'  },
  { key: 'zona',      prefix: 'en',        icon: 'map'      },
];

const IntentChips = ({ intents, label = 'Entendí esto:' }) => {
  const present = INTENT_DIMENSIONS.filter(d => intents && intents[d.key]);
  if (!present.length) return null;
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
      <span style={{ fontFamily: SPOTA.font.serif, fontStyle: 'italic', fontSize: 13, color: SPOTA.c.textSoft }}>
        {label}
      </span>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
        {present.map(d => (
          <span key={d.key} style={{
            display: 'inline-flex', alignItems: 'center', gap: 6,
            padding: '6px 10px', borderRadius: 999,
            background: SPOTA.c.surface, border: `1px solid ${SPOTA.c.line}`,
            fontFamily: SPOTA.font.ui, fontSize: 12.5,
          }}>
            <Icon name={d.icon} size={12} color={SPOTA.c.primary} />
            <span style={{ fontFamily: SPOTA.font.serif, fontStyle: 'italic', color: SPOTA.c.textSoft }}>
              {d.prefix}
            </span>
            <strong style={{ fontWeight: 600, color: SPOTA.c.text }}>
              {intents[d.key]}
            </strong>
          </span>
        ))}
      </div>
    </div>
  );
};

// ─────────────────────────────────────────────────────────────
// Search bar (con placeholder rotando)
// ─────────────────────────────────────────────────────────────
const SearchBar = ({ onClick, expanded, onSubmit, value, onChange, placeholders = [], hero = false }) => {
  const [phIdx, setPhIdx] = React.useState(0);
  React.useEffect(() => {
    if (!placeholders.length) return;
    const t = setInterval(() => setPhIdx(i => (i + 1) % placeholders.length), 3200);
    return () => clearInterval(t);
  }, [placeholders.length]);
  const ph = placeholders[phIdx] || '¿Qué vas a descubrir hoy?';

  // Modo hero: el input pasa a ser bloque protagónico de la pantalla
  // (alto generoso, fondo blanco, borde primary, shadow marcada).
  const styles = hero ? {
    height: 64, padding: '0 20px',
    background: '#FFFFFF',
    border: `1.5px solid ${SPOTA.c.primary}`,
    boxShadow: '0 8px 22px rgba(47, 111, 94, 0.12), 0 1px 3px rgba(47, 111, 94, 0.08)',
    iconColor: SPOTA.c.primary,
    iconSize: 22,
    fontSize: 16,
    phHeight: 24,
  } : {
    height: 52, padding: '0 14px',
    background: SPOTA.c.surface,
    border: `1px solid ${SPOTA.c.line}`,
    boxShadow: SPOTA.shadow.card,
    iconColor: SPOTA.c.textSoft,
    iconSize: 20,
    fontSize: 15,
    phHeight: 22,
  };

  return (
    <div onClick={onClick} style={{
      display: 'flex', alignItems: 'center', gap: 12,
      padding: styles.padding, height: styles.height,
      background: styles.background, borderRadius: SPOTA.radius.pill,
      border: styles.border, boxShadow: styles.boxShadow,
      cursor: 'text',
    }}>
      <Icon name="search" size={styles.iconSize} color={styles.iconColor} strokeWidth={hero ? 2.2 : 2} />
      {expanded ? (
        <>
          {/* P3-32: límite 200 chars con contador discreto a la derecha. */}
          <input autoFocus value={value} onChange={(e) => onChange && onChange(e.target.value.slice(0, 200))}
            onKeyDown={(e) => { if (e.key === 'Enter' && onSubmit) onSubmit(); }}
            maxLength={200}

function ageFromBirthAR(s) {
  const m = (s || '').match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if (!m) return null;
  const d = parseInt(m[1], 10), mo = parseInt(m[2], 10) - 1, y = parseInt(m[3], 10);
  const dt = new Date(y, mo, d);
  if (dt.getFullYear() !== y || dt.getMonth() !== mo || dt.getDate() !== d) return null;
  const today = new Date();
  let age = today.getFullYear() - y;
  const beforeBirthday = today.getMonth() < mo || (today.getMonth() === mo && today.getDate() < d);
  if (beforeBirthday) age -= 1;
  return age;
}

// CU-001-002 §3.1 — Verificación por código enviado al email (6 dígitos).
// Estados: input vacío / completo / inválido / vencido / bloqueado.
const ScreenVerifyCode = ({ nav, params }) => {
  const [digits, setDigits] = React.useState(['', '', '', '', '', '']);
  const [state, setState] = React.useState('idle'); // idle | invalid | expired | blocked
  const [remaining, setRemaining] = React.useState(300); // 5 minutos
  // CU-001-001 §3.11 paso 21: canónico = 60s entre reenvíos.
  const [resendIn, setResendIn] = React.useState(60);
  const [attempts, setAttempts] = React.useState(0);
  const refs = React.useRef([]);

  React.useEffect(() => {
    if (state === 'blocked') return;
    const t = setInterval(() => {
      setRemaining(r => Math.max(0, r - 1));
      setResendIn(r => Math.max(0, r - 1));
    }, 1000);
    return () => clearInterval(t);
  }, [state]);

  React.useEffect(() => {
    if (remaining === 0 && state !== 'blocked') setState('expired');
  }, [remaining, state]);

  const onDigit = (i, v) => {
    if (state === 'expired' || state === 'blocked') return;
    const digit = (v || '').replace(/[^0-9]/g, '').slice(-1);
    const next = [...digits];
    next[i] = digit;
    setDigits(next);
    if (digit && i < 5) refs.current[i + 1]?.focus();
  };

  const filled = digits.every(d => d.length === 1);
  const value = digits.join('');

  const submit = () => {
    if (value === '000000') {
      const a = attempts + 1;
      setAttempts(a);
      if (a >= 3) setState('blocked'); else setState('invalid');
    } else {
      // CU-001-001 §3.11 paso 22: tras verificar, alta nueva va al wizard de preferencias;
      // login va a Home.
      const from = params && params.from;
      if (from === 'register') nav('preferences', { mode: 'onboarding' });
      else nav('home');
    }
  };

  const resend = () => {
    if (resendIn > 0) return;
    setDigits(['','','','','','']);
    setState('idle');
    setRemaining(300);
    setResendIn(60);
  };

  const mm = String(Math.floor(remaining / 60)).padStart(2, '0');
  const ss = String(remaining % 60).padStart(2, '0');

  const message = {
    idle: 'Te enviamos un código de 6 dígitos. Llega en menos de 2 minutos.',
    invalid: 'El código no coincide. Volvé a ingresarlo o pedí uno nuevo.',
    expired: 'El código venció. Pedí uno nuevo para continuar.',
    blocked: 'Cuenta bloqueada por intentos fallidos. Probá más tarde o recuperá tu contraseña.',
  }[state];

  const messageColor = state === 'idle' ? SPOTA.c.textSoft : SPOTA.c.danger;

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: SPOTA.c.bg }}>
      <AppHeader title="Verificación" leftIcon="arrowLeft" onLeft={() => nav(params && params.from === 'register' ? 'register' : 'login')} />
      <div style={{ flex: 1, padding: '20px 24px 28px', display: 'flex', flexDirection: 'column' }}>
        <div style={{ width: 72, height: 72, borderRadius: 999, background: SPOTA.c.primarySoft, display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '8px 0 18px' }}>
          <Icon name="shield" size={32} color={SPOTA.c.primary} />
        </div>
        <h1 style={{ margin: '0 0 6px', fontFamily: SPOTA.font.ui, fontSize: 24, fontWeight: 700, color: SPOTA.c.text, letterSpacing: -0.4 }}>
          Ingresá el código
        </h1>
        <p style={{ margin: '0 0 24px', fontFamily: SPOTA.font.ui, fontSize: 14, color: messageColor, lineHeight: 1.5 }}>
          {message}
        </p>
        <div style={{ display: 'flex', gap: 8, marginBottom: 10 }}>
          {digits.map((d, i) => (
            <input key={i} ref={el => refs.current[i] = el}
              value={d} onChange={(e) => onDigit(i, e.target.value)}
              inputMode="numeric" maxLength={1}
              disabled={state === 'expired' || state === 'blocked'}
              style={{
                flex: 1, minWidth: 0, width: 0, height: 56, padding: 0,
                textAlign: 'center', borderRadius: 12,
                border: `1.5px solid ${state === 'invalid' ? SPOTA.c.danger : (d ? SPOTA.c.primary : SPOTA.c.line)}`,
                background: state === 'blocked' ? SPOTA.c.lineSoft : SPOTA.c.surface,
                fontFamily: SPOTA.font.ui, fontWeight: 700, fontSize: 22, color: SPOTA.c.text, outline: 'none',
              }}
            />

// CU-04: Gestionar preferencias (onboarding). Wizard de 5 pasos: el 5to es
// "Restricciones alimentarias y de accesibilidad" (opcional) — CU-001-004 §3.13.
const ScreenPreferences = ({ nav, embedded, params }) => {
  // CU-001-004 §3.13: dos modos del wizard (onboarding ↔ edit). El flag puede
  // venir como prop `embedded` (legacy) o como params.mode='onboarding'.
  const isOnboarding = embedded || (params && params.mode === 'onboarding');
  const isEdit = !isOnboarding;
  const finishTarget = isEdit ? 'profile' : 'home';
  const [step, setStep] = React.useState(1);
  const [types, setTypes] = React.useState(['Cafés', 'Cultura']);
  const [zones, setZones] = React.useState(['Palermo', 'Villa Crespo']);
  const [context, setContext] = React.useState('Pareja');
  const [freq, setFreq] = React.useState('Varias por semana');
  const [restrictions, setRestrictions] = React.useState([]);
  const total = 5;

  const toggle = (set, v, list) => set(list.includes(v) ? list.filter(x => x !== v) : [...list, v]);

  const optionGrid = (items, selected, onSelect, multi = true) => (
    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 10 }}>
      {items.map(it => {
        const on = multi ? selected.includes(it.label) : selected === it.label;
        return (
          <button key={it.label} onClick={() => multi ? toggle(onSelect, it.label, selected) : onSelect(it.label)} style={{
            padding: '16px 14px', borderRadius: 14, cursor: 'pointer', textAlign: 'left',
            background: on ? SPOTA.c.primary : SPOTA.c.surface,
            color: on ? '#fff' : SPOTA.c.text,
            border: `1.5px solid ${on ? SPOTA.c.primary : SPOTA.c.line}`,
            fontFamily: SPOTA.font.ui, transition: 'all 150ms',
          }}>
            <div style={{ marginBottom: 8 }}>
              <Icon name={it.icon} size={22} color={on ? '#fff' : SPOTA.c.secondary} />
            </div>
            <div style={{ fontWeight: 600, fontSize: 14 }}>{it.label}</div>
          </button>
        );
      })}
    </div>
  );

  const stepConfig = {
    1: {
      title: '¿Qué experiencias te gustan?',
      subtitle: 'Elegí al menos 3. Esto nos ayuda a recomendarte lo mejor.',
      content: optionGrid([
        { label: 'Cafés', icon: 'coffee' }, { label: 'Comida', icon: 'utensils' },
        { label: 'Bares', icon: 'wineglass' }, { label: 'Cultura', icon: 'palette' },
        { label: 'Aire libre', icon: 'leaf' }, { label: 'Música en vivo', icon: 'music' },
        { label: 'Cine y teatro', icon: 'mask' }, { label: 'Bienestar', icon: 'yoga' },
      ], types, setTypes),
    },
    2: {
      title: '¿Por qué barrios te movés?',
      subtitle: 'Sumá los que recorrés más seguido.',
      content: optionGrid([
        { label: 'Palermo', icon: 'pin' }, { label: 'Villa Crespo', icon: 'pin' },
        { label: 'San Telmo', icon: 'pin' }, { label: 'Recoleta', icon: 'pin' },
        { label: 'Belgrano', icon: 'pin' }, { label: 'Caballito', icon: 'pin' },
        { label: 'Chacarita', icon: 'pin' }, { label: 'Almagro', icon: 'pin' },
      ], zones, setZones),
    },
    3: {
      title: '¿Con quién salís más seguido?',
      subtitle: 'Esto define el estilo de las recomendaciones.',
      content: optionGrid([
        { label: 'Solo/a', icon: 'walk' }, { label: 'Pareja', icon: 'twoUsers' },
        { label: 'Amigos', icon: 'users' }, { label: 'Familia', icon: 'family' },
      ], context, setContext, false),
    },
    4: {
      title: '¿Con qué frecuencia salís?',
      subtitle: 'Para poder sugerirte planes nuevos al ritmo correcto.',
      content: optionGrid([
        { label: 'Varias por semana', icon: 'fire' }, { label: 'Una vez por semana', icon: 'calendar' },
        { label: 'Cada quince días', icon: 'clock' }, { label: 'Una vez por mes', icon: 'moon' },
      ], freq, setFreq, false),
    },
    5: {
      title: 'Restricciones (opcional)',
      subtitle: 'Si tenés alguna restricción alimentaria o de accesibilidad, las usamos para filtrar recomendaciones.',
      content: optionGrid([
        { label: 'Vegetariano', icon: 'leaf' }, { label: 'Vegano', icon: 'leaf' },
        { label: 'Sin gluten', icon: 'check' }, { label: 'Sin lactosa', icon: 'check' },
        { label: 'Movilidad reducida', icon: 'walk' }, { label: 'Sin restricciones', icon: 'sparkles' },
      ], restrictions, setRestrictions),
    },
  }[step];

  // P3-42: feedback de "Preferencias guardadas" antes de navegar al destino.
  const [toast, setToast] = React.useState(null);
  const next = () => {
    if (step < total) { setStep(step + 1); return; }
    setToast(isEdit ? 'Preferencias guardadas' : '¡Listo! Vamos a Descubrir');
    window.setTimeout(() => nav(finishTarget), 900);
  };

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: SPOTA.c.bg, position: 'relative' }}>
      <div style={{ padding: '12px 16px 4px', display: 'flex', alignItems: 'center', gap: 12 }}>
        {step > 1 ? (
          <button onClick={() => setStep(step - 1)} style={{ width: 40, height: 40, borderRadius: 999, border: 'none', background: 'transparent', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <Icon name="arrowLeft" size={22} />
          </button>
        ) : isEdit ? (
          <button onClick={() => nav('profile')} style={{ width: 40, height: 40, borderRadius: 999, border: 'none', background: 'transparent', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <Icon name="arrowLeft" size={22} />
          </button>
        ) : null}
        <div style={{ flex: 1, display: 'flex', gap: 4 }}>
          {[...Array(total)].map((_, i) => (
            <div key={i} style={{
              flex: 1, height: 4, borderRadius: 999,
              background: i < step ? SPOTA.c.primary : SPOTA.c.line,
              transition: 'background 200ms',
            }} />
          ))}
        </div>
        {isOnboarding && (
          <button onClick={() => nav('home')} style={{ border: 'none', background: 'transparent', cursor: 'pointer', fontFamily: SPOTA.font.ui, fontSize: 13, fontWeight: 600, color: SPOTA.c.textSoft }}>
            Saltar
          </button>
        )}
      </div>
      <div style={{ flex: 1, padding: '16px 24px 24px', display: 'flex', flexDirection: 'column' }}>
        <p style={{ margin: '0 0 6px', fontFamily: SPOTA.font.ui, fontSize: 13, fontWeight: 700, color: SPOTA.c.primary, letterSpacing: 0.4, textTransform: 'uppercase' }}>
          Paso {step} de {total}
        </p>
        <h1 style={{ margin: '0 0 8px', fontFamily: SPOTA.font.ui, fontSize: 26, fontWeight: 700, color: SPOTA.c.text, letterSpacing: -0.4, lineHeight: 1.2 }}>
          {stepConfig.title}
        </h1>
        <p style={{ margin: '0 0 24px', fontFamily: SPOTA.font.ui, fontSize: 14.5, color: SPOTA.c.textSoft, lineHeight: 1.5 }}>
          {stepConfig.subtitle}
        </p>
        {stepConfig.content}
        <div style={{ marginTop: 'auto', paddingTop: 24 }}>
          <Btn variant="primary" size="lg" full iconRight="arrowRight" onClick={next}>
            {step === total ? (isEdit ? 'Guardar preferencias' : 'Empezar a explorar') : 'Continuar'}
          </Btn>
          {step === 5 && (
            <button onClick={() => { setRestrictions(['Sin restricciones']); next(); }} style={{
              marginTop: 12, width: '100%', border: 'none', background: 'transparent', cursor: 'pointer',
              fontFamily: SPOTA.font.ui, fontSize: 13.5, fontWeight: 600, color: SPOTA.c.textSoft,
            }}>
              Saltar este paso
            </button>
          )}
        </div>
      </div>
      {toast && (
        <div style={{
          position: 'fixed', left: '50%', bottom: 110, transform: 'translateX(-50%)',
          background: SPOTA.c.text, color: SPOTA.c.bg,
          fontFamily: SPOTA.font.ui, fontSize: 13, fontWeight: 500,
          padding: '10px 18px', borderRadius: 999, boxShadow: SPOTA.shadow.lg,
          zIndex: 60, pointerEvents: 'none',
        }}>{toast}</div>
      )}
    </div>
  );
};

// CU-05: Gestionar credenciales
// CU-05: Credenciales y privacidad — mismo set de campos que el desktop (email + cambiar contraseña + zona de peligro).
// Nombre, username, bio y zona viven en editProfile (pendiente en mobile, ver backlog).
const ScreenCredentials = ({ nav }) => {
  const [cur, setCur] = React.useState('');
  const [nu, setNu] = React.useState('');
  const [cf, setCf] = React.useState('');
  const [error, setError] = React.useState(null);
  const [success, setSuccess] = React.useState(false);
  const [confirmDelete, setConfirmDelete] = React.useState(false);
  const submit = () => {
    setSuccess(false);
    if (!cur || !nu || !cf) { setError('Completá los tres campos.'); return; }
    if (nu.length < 8) { setError('La contraseña nueva debe tener al menos 8 caracteres.'); return; }
    if (nu !== cf) { setError('La contraseña nueva y la confirmación no coinciden.'); return; }
    setError(null);
    setSuccess(true);
    setCur(''); setNu(''); setCf('');
    setTimeout(() => setSuccess(false), 3000);
  };
  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: SPOTA.c.bg, position: 'relative' }}>
      <AppHeader title="Credenciales y privacidad" leftIcon="arrowLeft" onLeft={() => nav('profile')} />
      <div style={{ flex: 1, overflow: 'auto', padding: 20 }}>
        {/* Email — solo lectura en MVP (CU-001-005 §3.14). El cambio de email no está en alcance. */}
        <div style={{ background: SPOTA.c.surface, borderRadius: 14, padding: 16, marginBottom: 12, border: `1px solid ${SPOTA.c.lineSoft}`, display: 'flex', alignItems: 'center', gap: 12 }}>
          <Icon name="mail" size={20} color={SPOTA.c.primary} />
          <div style={{ flex: 1, minWidth: 0 }}>
            <h3 style={{ margin: '0 0 2px', fontFamily: SPOTA.font.ui, fontWeight: 700, fontSize: 14.5, color: SPOTA.c.text }}>Email</h3>
            <p style={{ margin: 0, fontFamily: SPOTA.font.ui, fontSize: 12.5, color: SPOTA.c.textSoft, overflow: 'hidden', textOverflow: 'ellipsis' }}>sol.b•••••@correo.com</p>
          </div>
          <span style={{ fontFamily: SPOTA.font.ui, fontSize: 11.5, color: SPOTA.c.textMuted, fontStyle: 'italic' }}>Solo lectura</span>
        </div>

        {/* Cambiar contraseña */}
        <div style={{ background: SPOTA.c.surface, borderRadius: 14, padding: 16, marginBottom: 12, border: `1px solid ${SPOTA.c.lineSoft}` }}>
          <h3 style={{ margin: '0 0 12px', fontFamily: SPOTA.font.ui, fontWeight: 700, fontSize: 14.5, color: SPOTA.c.text }}>Cambiar contraseña</h3>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            <Field label="Contraseña actual" type="password" value={cur} placeholder="Tu contraseña actual" onChange={setCur} icon="lock" />
            <Field label="Contraseña nueva" type="password" value={nu} placeholder="Mínimo 8 caracteres" onChange={setNu} icon="lock" />
            <Field label="Confirmar contraseña" type="password" value={cf} placeholder="Repetí la nueva" onChange={setCf} icon="lock" />
          </div>
          {error && (
            <p style={{ margin: '10px 0 0', fontFamily: SPOTA.font.ui, fontSize: 12.5, color: SPOTA.c.danger }}>{error}</p>
          )}
          {success && (
            <p style={{ margin: '10px 0 0', fontFamily: SPOTA.font.ui, fontSize: 12.5, color: SPOTA.c.success }}>Contraseña actualizada. Cerramos otras sesiones por seguridad.</p>
          )}
          <div style={{ marginTop: 14 }}>
            <Btn variant="primary" full icon="check" onClick={submit}>Actualizar contraseña</Btn>
          </div>
        </div>

        {/* Zona de peligro */}
        <div style={{ background: SPOTA.c.surface, borderRadius: 14, padding: 16, border: `1px solid ${SPOTA.c.danger}33` }}>
          <h3 style={{ margin: '0 0 6px', fontFamily: SPOTA.font.ui, fontWeight: 700, fontSize: 14.5, color: SPOTA.c.danger }}>Zona de peligro</h3>
          <p style={{ margin: '0 0 12px', fontFamily: SPOTA.font.ui, fontSize: 12.5, color: SPOTA.c.textSoft, lineHeight: 1.5 }}>
            Eliminar tu cuenta es irreversible. Vamos a borrar tu perfil, tus reseñas y tus colecciones privadas.
            Las reseñas públicas quedan como anónimas para preservar la integridad del Fama Score de la comunidad.
          </p>
          <button onClick={() => setConfirmDelete(true)} style={{
            padding: '10px 14px', borderRadius: 10, cursor: 'pointer',
            background: 'transparent', color: SPOTA.c.danger, border: `1.5px solid ${SPOTA.c.danger}`,
            fontFamily: SPOTA.font.ui, fontWeight: 700, fontSize: 13.5,
            display: 'inline-flex', alignItems: 'center', gap: 6,
          }}>
            <Icon name="trash" size={15} color={SPOTA.c.danger} /> Eliminar cuenta
          </button>
        </div>
      </div>
      {/* Modal de confirmación de eliminación (Alt 1 §3.14) */}
      {confirmDelete && (
        <div onClick={() => setConfirmDelete(false)} style={{
          position: 'absolute', inset: 0, background: 'rgba(43,37,35,0.55)',
          display: 'flex', alignItems: 'flex-end', zIndex: 80,
        }}>
          <div onClick={(e) => e.stopPropagation()} style={{
            background: SPOTA.c.bg, width: '100%',
            borderTopLeftRadius: 22, borderTopRightRadius: 22,
            padding: '14px 22px 24px', animation: 'slideUp 260ms cubic-bezier(.2,.8,.2,1)',
          }}>
            <div style={{ width: 40, height: 4, borderRadius: 999, background: SPOTA.c.line, margin: '0 auto 14px' }} />
            <h2 style={{ margin: '0 0 8px', fontFamily: SPOTA.font.ui, fontWeight: 700, fontSize: 20, color: SPOTA.c.danger }}>Eliminar cuenta</h2>
            <p style={{ margin: '0 0 16px', fontFamily: SPOTA.font.ui, fontSize: 13.5, color: SPOTA.c.text, lineHeight: 1.5 }}>
              Esta acción es <strong>irreversible</strong>. Vamos a borrar tu perfil, tus reseñas privadas y tus colecciones privadas. Las reseñas públicas quedan anónimas.
            </p>
            <div style={{ display: 'flex', gap: 10 }}>
              <Btn variant="outline" full onClick={() => setConfirmDelete(false)}>Cancelar</Btn>
              <Btn variant="primary" full icon="trash" style={{ background: SPOTA.c.danger }} onClick={() => { setConfirmDelete(false); nav('login'); }}>Eliminar</Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

Object.assign(window, { ScreenRegister, ScreenLogin, ScreenVerifyCode, ScreenPreferences, ScreenCredentials });

</script>

// CU-006-002 §3.9 — Contratar Host. Flujo: resumen pre-pago → paywall Variante A
// (usuario sin medio configurado) → confirmación post-cobro → redirect a Planes.
const PARTICIPANTS = 4; // mock: cantidad de participantes del plan asociado
const COMMISSION_PCT = 0.12;

// Paywall Variante A (mobile) — reutilizable. Sub-flujo de ingreso de tarjeta + facturación.
const PaywallVariantA = ({ amount, onCancel, onConfirm, subtitle, ctaLabel, savedMedio, chargeNote }) => {
  const [card, setCard] = React.useState({ tipo: 'Tarjeta de crédito', numero: '', venc: '', cvv: '' });
  const [bill, setBill] = React.useState({ nombre: '', dni: '', iva: 'Consumidor final', email: '' });
  const [save, setSave] = React.useState(true);
  const [expanded, setExpanded] = React.useState(!savedMedio);
  const [processing, setProcessing] = React.useState(false);
  const setC = (k, v) => setCard(s => ({ ...s, [k]: v }));
  const setB = (k, v) => setBill(s => ({ ...s, [k]: v }));
  const usingSaved = savedMedio && !expanded;
  const filled = card.numero && card.venc && card.cvv && bill.nombre && bill.dni && bill.email;
  const canConfirm = usingSaved || filled;
  const doConfirm = () => {
    setProcessing(true);
    setTimeout(() => onConfirm({ card: usingSaved ? savedMedio : card, bill, save }), 1100);
  };
  return (
    <div style={{ position: 'absolute', inset: 0, background: SPOTA.c.bg, zIndex: 90, display: 'flex', flexDirection: 'column', animation: 'slideUp 240ms' }}>
      <AppHeader title="Datos de pago" leftIcon="close" onLeft={processing ? undefined : onCancel} />
      <div style={{ flex: 1, overflow: 'auto', padding: 20 }}>
        {subtitle && (
          <p style={{ margin: '0 0 16px', fontFamily: SPOTA.font.ui, fontSize: 13.5, color: SPOTA.c.textSoft, lineHeight: 1.5 }}>{subtitle}</p>
        )}
        {usingSaved ? (
          <div style={{ background: SPOTA.c.surface, borderRadius: 14, padding: 16, border: `1px solid ${SPOTA.c.lineSoft}` }}>
            <h3 style={{ margin: '0 0 10px', fontFamily: SPOTA.font.ui, fontWeight: 700, fontSize: 15, color: SPOTA.c.text }}>Medio de pago</h3>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 10 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <Icon name="wallet" size={18} color={SPOTA.c.primary} />
                <div>
                  <div style={{ fontFamily: SPOTA.font.ui, fontWeight: 600, fontSize: 14, color: SPOTA.c.text }}>{savedMedio.tipo} •••• {savedMedio.last4}</div>
                  <div style={{ fontFamily: SPOTA.font.ui, fontSize: 12.5, color: SPOTA.c.textSoft }}>{savedMedio.note}</div>
                </div>
              </div>
              <Btn variant="ghost" size="sm" disabled={processing} onClick={() => setExpanded(true)}>Cambiar</Btn>
            </div>
            {chargeNote && (
              <p style={{ margin: '10px 0 0', fontFamily: SPOTA.font.ui, fontSize: 12.5, color: SPOTA.c.textMuted }}>{chargeNote}</p>
            )}
          </div>
        ) : (
          <React.Fragment>
            <h3 style={{ margin: '0 0 10px', fontFamily: SPOTA.font.ui, fontWeight: 700, fontSize: 15, color: SPOTA.c.text }}>Medio de pago</h3>
            <div style={{ display: 'flex', gap: 8, marginBottom: 10 }}>
              {['Tarjeta de crédito', 'Tarjeta de débito'].map(t => (
                <Chip key={t} active={card.tipo === t} onClick={() => setC('tipo', t)}>{t}</Chip>
              ))}
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12, marginBottom: 18 }}>
              <Field label="Número de tarjeta (16 dígitos)" placeholder="4111 1111 1111 1111" value={card.numero} onChange={(v) => setC('numero', v)} icon="wallet" />
              <div style={{ display: 'flex', gap: 10 }}>
                <Field label="Vencimiento (MM/AAAA)" placeholder="12/2028" value={card.venc} onChange={(v) => setC('venc', v)} />
                <Field label="Código (3 o 4 dígitos)" placeholder="123" value={card.cvv} onChange={(v) => setC('cvv', v)} />
              </div>
            </div>
            <h3 style={{ margin: '0 0 10px', fontFamily: SPOTA.font.ui, fontWeight: 700, fontSize: 15, color: SPOTA.c.text }}>Facturación</h3>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12, marginBottom: 12 }}>
              <Field label="Nombre completo" placeholder="Sol Benítez" value={bill.nombre} onChange={(v) => setB('nombre', v)} icon="user" />
              <Field label="DNI (XX.XXX.XXX)" placeholder="34.567.890" value={bill.dni} onChange={(v) => setB('dni', v)} />
              <div>
                <div style={{ fontFamily: SPOTA.font.ui, fontWeight: 600, fontSize: 13, color: SPOTA.c.text, marginBottom: 6 }}>Condición frente al IVA</div>
                <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                  {['Consumidor final', 'Monotributista'].map(o => (
                    <Chip key={o} active={bill.iva === o} onClick={() => setB('iva', o)}>{o}</Chip>
                  ))}
                </div>
              </div>
              <Field label="Email para comprobantes" placeholder="vos@correo.com" value={bill.email} onChange={(v) => setB('email', v)} icon="mail" />
            </div>
            <label style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 16, cursor: 'pointer' }}>
              <input type="checkbox" checked={save} onChange={(e) => setSave(e.target.checked)} />
              <span style={{ fontFamily: SPOTA.font.ui, fontSize: 13, color: SPOTA.c.text }}>Guardar medio de pago y datos de facturación para próximas veces.</span>
            </label>
          </React.Fragment>
        )}
      </div>
      <div style={{ padding: '12px 20px 18px', background: SPOTA.c.bg, borderTop: `1px solid ${SPOTA.c.lineSoft}` }}>
        <Btn variant="primary" size="lg" full disabled={processing || !canConfirm} icon="check" onClick={doConfirm}>
          {processing ? 'Procesando pago…' : (ctaLabel || ('Pagar $' + amount.toLocaleString('es-AR')))}
        </Btn>
      </div>
    </div>
  );
};

<script>
// Bootstrap: transform & eval each text/babel script in order, in document scope.
// This is more reliable than Babel's auto-runner for many large inline scripts.
window.addEventListener('DOMContentLoaded', () => {
  const scripts = [...document.querySelectorAll('script[type="text/babel"]')];
  for (let i = 0; i < scripts.length; i++) {
    const s = scripts[i];
    try {
      const code = Babel.transform(s.textContent, { presets: ['react'] }).code;
      // Use indirect eval so it runs in global scope
      (0, eval)(code);
    } catch (e) {
      console.error('[bootstrap] script', i, 'failed:', e);
      const div = document.getElementById('app');
      if (div) div.innerHTML = '<pre style="color:#f88;padding:24px;font-family:monospace;font-size:12px;white-space:pre-wrap">Error en script ' + i + ':\n' + (e.message || e) + '</pre>';
      break;
    }
  }
});
</script>

const ScreenResetPassword = ({ nav }) => {
  const [pwd, setPwd] = React.useState('');
  const [confirm, setConfirm] = React.useState('');
  const [toast, setToast] = React.useState(null);
  const tooShort = pwd.length > 0 && pwd.length < 8;
  const mismatch = confirm.length > 0 && pwd !== confirm;
  const valid = pwd.length >= 8 && pwd === confirm;
  const submit = () => {
    if (!valid) return;
    setToast('Contraseña actualizada · cerramos otras sesiones');
    window.setTimeout(() => nav('login'), 1200);
  };
  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: SPOTA.c.bg, position: 'relative' }}>
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center', padding: '0 24px' }}>

          <Icon name="lock" size={36} color={SPOTA.c.primary} />
        </div>
        <h1 style={{ margin: '0 0 8px', fontFamily: SPOTA.font.ui, fontSize: 26, fontWeight: 700, color: SPOTA.c.text, letterSpacing: -0.4, textAlign: 'center' }}>

        </h1>
        <p style={{ margin: '0 0 22px', fontFamily: SPOTA.font.ui, fontSize: 14, color: SPOTA.c.textSoft, lineHeight: 1.5, textAlign: 'center' }}>
          Mínimo 8 caracteres. Al guardar, cerramos cualquier sesión activa en otros dispositivos.
        </p>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          <Field label="Contraseña nueva" type="password" placeholder="Mínimo 8 caracteres" value={pwd} onChange={setPwd} icon="lock" error={tooShort ? 'Tiene que tener al menos 8 caracteres.' : null} />
          <Field label="Confirmar contraseña" type="password" placeholder="Repetí la nueva" value={confirm} onChange={setConfirm} icon="lock" error={mismatch ? 'No coincide con la nueva contraseña.' : null} />

      </div>
      <div style={{ padding: '12px 24px 28px' }}>
        <Btn variant="primary" size="lg" full disabled={!valid} onClick={submit}>Actualizar contraseña</Btn>
      </div>
      {toast && (

          background: SPOTA.c.text, color: SPOTA.c.bg,
          fontFamily: SPOTA.font.ui, fontSize: 13, fontWeight: 500,

  );
};

const ScreenSearchResults = ({ nav, params }) => {
  const tweaks = window.__SPOTA_TWEAKS || {};
  const initialQuery = (params && params.query) || 'algo tranquilo en Palermo con una amiga el sábado';

  const [activeQuery, setActiveQuery] = React.useState(initialQuery);
  const [draftQuery, setDraftQuery] = React.useState(initialQuery);
  const [loading, setLoading] = React.useState(true);
  const [view, setView] = React.useState('list'); // list | map
  const intents = window.interpretQuery(activeQuery);

  React.useEffect(() => {
    setLoading(true);
    const t = setTimeout(() => setLoading(false), 750);
    return () => clearTimeout(t);
  }, [activeQuery]);

  const submit = () => {
    const q = (draftQuery || '').trim();
    if (!q || q === activeQuery) return;
    setActiveQuery(q);
  };

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: SPOTA.c.bg }}>
      {/* Header: back + input editable refinable */}
      <div style={{ padding: '10px 16px 8px', display: 'flex', alignItems: 'center', gap: 10, background: SPOTA.c.bg }}>
        <button onClick={() => nav('home')} style={{ width: 40, height: 40, borderRadius: 999, border: 'none', background: 'transparent', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
          <Icon name="arrowLeft" size={20} />
        </button>
        <div style={{ flex: 1, minWidth: 0, display: 'flex', alignItems: 'center', gap: 8, padding: '10px 14px', background: SPOTA.c.surface, borderRadius: 999, border: `1.5px solid ${SPOTA.c.line}` }}>
          <Icon name="search" size={16} color={SPOTA.c.textSoft} />
          <input
            value={draftQuery}
            onChange={(e) => setDraftQuery(e.target.value)}
            onKeyDown={(e) => { if (e.key === 'Enter') { e.target.blur(); submit(); } }}
            style={{
              flex: 1, minWidth: 0, border: 'none', outline: 'none', background: 'transparent',
              fontFamily: SPOTA.font.ui, fontSize: 14, color: SPOTA.c.text,
            }}
          />
          {draftQuery && draftQuery !== activeQuery && (
            <button onClick={submit} style={{

            }}>Refinar</button>
          )}
        </div>
      </div>

      {loading ? (
        <ConciergeLoading intents={intents} />
      ) : (
        <React.Fragment>
          <div style={{ padding: '4px 16px 12px' }}>
            <IntentChips intents={intents} />
          </div>

          {/* Toggle Lista/Mapa + contador */}

              <strong style={{ color: SPOTA.c.text }}>{PLACES.length} lugares</strong> por afinidad

            <div style={{ display: 'inline-flex', borderRadius: 999, background: SPOTA.c.surface, padding: 3, border: `1px solid ${SPOTA.c.line}` }}>
              {[{ id: 'list', i: 'list', l: 'Lista' }, { id: 'map', i: 'map', l: 'Mapa' }].map(t => (
                <button key={t.id} onClick={() => setView(t.id)} style={{
                  border: 'none', cursor: 'pointer', padding: '6px 12px', borderRadius: 999,
                  background: view === t.id ? SPOTA.c.primary : 'transparent',
                  color: view === t.id ? '#fff' : SPOTA.c.textSoft,

// Wrapper para reusar el MapView del módulo de Discover desde SearchResults.

const ScreenCollectionDetail = ({ nav, params }) => {

  };
  const onShare = () => {

  const matched = activity !== 'Todas' ? placesAll.filter(p => matchesActivity(p, activity)) : placesAll;

              <Icon name="bookmark" size={16} color="#fff" />

            position: 'absolute', bottom: 14, left: '50%', transform: 'translateX(-50%)',
