<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Fraunces:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: "DM Sans", system-ui, sans-serif; background: #1a1614; color: #f5ede0; -webkit-font-smoothing: antialiased; }

    background:
      radial-gradient(1200px 800px at 20% 10%, #2a201c 0%, transparent 60%),
      radial-gradient(1000px 700px at 90% 90%, #1f2a26 0%, transparent 60%),
      #14110f;
    min-height: 100vh;
  }
  #app { width: 100%; min-height: 100vh; }
  button { font-family: inherit; }
  input, textarea { font-family: inherit; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  .placeholder-rotate { animation: fadeIn 250ms; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<!-- ios-frame.jsx -->
<script type="text/babel" data-presets="react">

// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports: IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar (absolute) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto', display: 'flex', flexDirection: 'column' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      {/* liquid glass bg — same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />

      {/* autocorrect bar */}
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>

      {/* key layout */}
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

Object.assign(window, {
  IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard,
});

</script>

//         Hello

//           <TweakSection label="Typography" />

//                        onChange={(v) => setTweak('fontSize', v)} />
//           <TweakRadio  label="Density" value={t.density}
//                        options={['compact', 'regular', 'comfy']}
//                        onChange={(v) => setTweak('density', v)} />
//           <TweakSection label="Theme" />

// ─────────────────────────────────────────────────────────────────────────────

const __TWEAKS_STYLE = `
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;
    max-height:calc(100vh - 32px);display:flex;flex-direction:column;
    background:rgba(250,249,247,.78);color:#29261b;
    -webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);
    border:.5px solid rgba(255,255,255,.6);border-radius:14px;
    box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);
    font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}
  .twk-hd{display:flex;align-items:center;justify-content:space-between;
    padding:10px 8px 10px 14px;cursor:move;user-select:none}
  .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}
  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);
    width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
  .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;

    scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent}
  .twk-body::-webkit-scrollbar{width:8px}
  .twk-body::-webkit-scrollbar-track{background:transparent;margin:2px}
  .twk-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px;
    border:2px solid transparent;background-clip:content-box}
  .twk-body::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.25);
    border:2px solid transparent;background-clip:content-box}
  .twk-row{display:flex;flex-direction:column;gap:5px}
  .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;
    color:rgba(41,38,27,.72)}
  .twk-lbl>span:first-child{font-weight:500}
  .twk-val{color:rgba(41,38,27,.5);font-variant-numeric:tabular-nums}

  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:rgba(41,38,27,.45);padding:10px 0 0}
  .twk-sect:first-child{padding-top:0}

  .twk-field{appearance:none;width:100%;height:26px;padding:0 8px;
    border:.5px solid rgba(0,0,0,.1);border-radius:7px;
    background:rgba(255,255,255,.6);color:inherit;font:inherit;outline:none}
  .twk-field:focus{border-color:rgba(0,0,0,.25);background:rgba(255,255,255,.85)}
  select.twk-field{padding-right:22px;

  .twk-swatch::-moz-color-swatch{border:0;border-radius:5.5px}
`;

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

const Btn = ({ children, variant = 'primary', size = 'md', onClick, full, icon, iconRight, style = {}, disabled }) => {
  const sizes = {
    sm: { h: 36, px: 14, fs: 14, r: 10 },
    md: { h: 48, px: 18, fs: 15, r: 12 },
    lg: { h: 56, px: 22, fs: 16, r: 14 },
  }[size];
  const palettes = {
    primary: { bg: SPOTA.c.primary, c: '#fff', bd: 'transparent', hover: SPOTA.c.primaryDark },
    secondary: { bg: SPOTA.c.secondary, c: '#fff', bd: 'transparent', hover: SPOTA.c.secondaryDark },
    outline: { bg: 'transparent', c: SPOTA.c.text, bd: SPOTA.c.line, hover: SPOTA.c.bgAlt },
    ghost: { bg: 'transparent', c: SPOTA.c.text, bd: 'transparent', hover: SPOTA.c.lineSoft },
    light: { bg: SPOTA.c.surface, c: SPOTA.c.text, bd: SPOTA.c.line, hover: SPOTA.c.bgAlt },
    dark: { bg: SPOTA.c.text, c: '#fff', bd: 'transparent', hover: '#000' },
  }[variant];
  const [hover, setHover] = React.useState(false);
  return (
    <button onClick={onClick} disabled={disabled}
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{
        height: sizes.h, padding: `0 ${sizes.px}px`, borderRadius: sizes.r,
        background: hover && !disabled ? palettes.hover : palettes.bg, color: palettes.c,
        border: `1px solid ${palettes.bd === 'transparent' ? 'transparent' : palettes.bd}`,
        fontFamily: SPOTA.font.ui, fontWeight: 600, fontSize: sizes.fs,
        cursor: disabled ? 'not-allowed' : 'pointer', opacity: disabled ? 0.5 : 1,
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8,
        width: full ? '100%' : 'auto', transition: 'background 120ms, transform 120ms',
        transform: hover && !disabled ? 'translateY(-1px)' : 'none',
        ...style,
      }}>
      {icon && <Icon name={icon} size={18} />}
      {children}
      {iconRight && <Icon name={iconRight} size={18} />}
    </button>
  );
};

    softA: { bg: SPOTA.c.accentSoft, c: '#7A5A12' },
    line: { bg: 'rgba(255,255,255,0.92)', c: SPOTA.c.text, bd: SPOTA.c.line },
  }[kind];
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 4,
      padding: '4px 10px', borderRadius: 999,
      background: palettes.bg, color: palettes.c,

// Proof of Visit pill — verde petróleo con micro-animación
// ─────────────────────────────────────────────────────────────
const ProofOfVisit = ({ size = 'sm', style = {} }) => {
  const [hover, setHover] = React.useState(false);
  const isLg = size === 'lg';
  return (
    <span
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{
        display: 'inline-flex', alignItems: 'center', gap: 5,
        padding: isLg ? '6px 12px' : '4px 9px',
        borderRadius: 999,
        background: SPOTA.c.primary, color: '#fff',
        fontFamily: SPOTA.font.ui, fontWeight: 600, fontSize: isLg ? 12.5 : 11,
        boxShadow: hover ? '0 4px 12px rgba(47,111,94,0.35)' : '0 1px 3px rgba(47,111,94,0.2)',
        transform: hover ? 'translateY(-1px) scale(1.02)' : 'none',
        transition: 'transform 200ms cubic-bezier(.2,.7,.2,1), box-shadow 200ms',
        ...style,
      }}>
      <span style={{
        width: isLg ? 16 : 14, height: isLg ? 16 : 14, borderRadius: 999,
        background: '#fff', color: SPOTA.c.primary,
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
        transform: hover ? 'rotate(360deg)' : 'rotate(0)', transition: 'transform 500ms ease',

        <Icon name="check" size={isLg ? 11 : 9} color={SPOTA.c.primary} strokeWidth={3} />
      </span>
      Visitado
    </span>

};

// ─────────────────────────────────────────────────────────────
// Fama Score — 3 variantes (toggle por tweak)
// ─────────────────────────────────────────────────────────────
const FamaScore = ({ score = 4.7, count = 256, affinity = 92, variant = 'classic', size = 'sm' }) => {
  if (variant === 'ring') {
    const r = size === 'lg' ? 22 : 14;
    const circ = 2 * Math.PI * r;
    const off = circ - (score / 5) * circ;
    return (
      <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
        <div style={{ position: 'relative', width: r * 2 + 6, height: r * 2 + 6 }}>
          <svg width={r * 2 + 6} height={r * 2 + 6}>
            <circle cx={r + 3} cy={r + 3} r={r} stroke={SPOTA.c.lineSoft} strokeWidth={3} fill="none" />
            <circle cx={r + 3} cy={r + 3} r={r} stroke={SPOTA.c.accent} strokeWidth={3} fill="none"
              strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round"
              transform={`rotate(-90 ${r + 3} ${r + 3})`} />
          </svg>
          <span style={{
            position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontFamily: SPOTA.font.ui, fontWeight: 700, fontSize: size === 'lg' ? 13 : 10, color: SPOTA.c.text,
          }}>{score.toFixed(1)}</span>
        </div>
        <span style={{ fontFamily: SPOTA.font.ui, fontSize: size === 'lg' ? 13 : 12, color: SPOTA.c.textSoft }}>
          ({count})
        </span>
      </div>
    );
  }
  if (variant === 'affinity') {
    const pct = affinity;
    return (
      <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
        <div style={{
          display: 'inline-flex', alignItems: 'center', gap: 5,
          padding: '3px 8px 3px 6px', borderRadius: 999,
          background: SPOTA.c.accentSoft, color: '#7A5A12',
          fontFamily: SPOTA.font.ui, fontWeight: 700, fontSize: size === 'lg' ? 13 : 11.5,
        }}>
          <Icon name="sparkles" size={12} color="#7A5A12" strokeWidth={2} />
          {pct}% para vos
        </div>
        <span style={{ fontFamily: SPOTA.font.ui, fontSize: 12, color: SPOTA.c.textSoft }}>
          · {score.toFixed(1)} ({count})
        </span>
      </div>
    );
  }
  // classic
  return (
    <div style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}>
      <Icon name="star" size={size === 'lg' ? 18 : 14} color={SPOTA.c.accent} />
      <span style={{ fontFamily: SPOTA.font.ui, fontWeight: 700, fontSize: size === 'lg' ? 15 : 13, color: SPOTA.c.text }}>
        {score.toFixed(1)}
      </span>
      <span style={{ fontFamily: SPOTA.font.ui, fontSize: size === 'lg' ? 14 : 12.5, color: SPOTA.c.textSoft }}>
        ({count})
      </span>
    </div>
  );
};

// ─────────────────────────────────────────────────────────────
// Place Card (descubrimiento)
// ─────────────────────────────────────────────────────────────

// ─────────────────────────────────────────────────────────────
// Avatar (con opcional Fama Score ring)
// ─────────────────────────────────────────────────────────────

);

// ─────────────────────────────────────────────────────────────
// Search bar (con placeholder rotando)
// ─────────────────────────────────────────────────────────────
const SearchBar = ({ onClick, expanded, onSubmit, value, onChange, placeholders = [] }) => {
  const [phIdx, setPhIdx] = React.useState(0);
  React.useEffect(() => {
    if (!placeholders.length) return;
    const t = setInterval(() => setPhIdx(i => (i + 1) % placeholders.length), 3200);
    return () => clearInterval(t);
  }, [placeholders.length]);
  const ph = placeholders[phIdx] || '¿Qué vas a descubrir hoy?';
  return (
    <div onClick={onClick} style={{
      display: 'flex', alignItems: 'center', gap: 10,
      padding: '0 14px', height: 52,
      background: SPOTA.c.surface, borderRadius: SPOTA.radius.pill,
      border: `1px solid ${SPOTA.c.line}`, boxShadow: SPOTA.shadow.card,
      cursor: 'text',
    }}>
      <Icon name="search" size={20} color={SPOTA.c.textSoft} />
      {expanded ? (
        <input autoFocus value={value} onChange={(e) => onChange && onChange(e.target.value)}
          onKeyDown={(e) => { if (e.key === 'Enter' && onSubmit) onSubmit(); }}
          placeholder={ph}
          style={{
            flex: 1, border: 'none', outline: 'none', background: 'transparent',
            fontFamily: SPOTA.font.ui, fontSize: 15, color: SPOTA.c.text,
          }} />
      ) : (
        <div style={{ flex: 1, position: 'relative', height: 22, overflow: 'hidden' }}>
          {placeholders.map((p, i) => (
            <span key={i} style={{
              position: 'absolute', inset: 0, display: 'flex', alignItems: 'center',
              fontFamily: SPOTA.font.ui, fontSize: 14.5, color: SPOTA.c.textSoft,
              opacity: i === phIdx ? 1 : 0,
              transform: i === phIdx ? 'translateY(0)' : 'translateY(8px)',
              transition: 'opacity 300ms, transform 300ms',
            }}>
              {p}
            </span>
          ))}
        </div>
      )}
    </div>
  );
};

// ─────────────────────────────────────────────────────────────
// App Header (brand + acciones)
// ─────────────────────────────────────────────────────────────

      )}
    </div>
    {showLogo ? (
      <SpotaLogo size={22} dark={dark} color={dark ? '#fff' : SPOTA.c.primary} />
    ) : (

        {title}
      </h1>

    <div style={{ width: 40, display: 'flex', justifyContent: 'flex-end' }}>
      {rightIcon && (
        <button onClick={onRight} style={{
          width: 40, height: 40, borderRadius: 999, border: 'none', background: 'transparent',

        }}>

        </button>

);

// ─────────────────────────────────────────────────────────────
// TabBar inferior con FAB central
// ─────────────────────────────────────────────────────────────
const TabBar = ({ active, onChange, onPublish }) => {
  const tabs = [
    { id: 'discover', label: 'Descubrir', icon: 'compass' },
    { id: 'collections', label: 'Colecciones', icon: 'collection' },
    { id: 'fab', fab: true },
    { id: 'plans', label: 'Planes', icon: 'users' },
    { id: 'profile', label: 'Perfil', icon: 'user' },
  ];
  return (
    <div style={{
      position: 'relative', height: 78,

      boxShadow: SPOTA.shadow.nav,
      display: 'flex', alignItems: 'flex-start', justifyContent: 'space-around',
      paddingTop: 10, paddingBottom: 12,
    }}>
      {tabs.map(t => {
        if (t.fab) return (
          <button key="fab" onClick={onPublish} style={{
            width: 58, height: 58, borderRadius: 999, border: 'none', cursor: 'pointer',
            background: SPOTA.c.secondary,
            transform: 'translateY(-18px)',

            transition: 'transform 200ms',
          }}
          onMouseEnter={(e) => e.currentTarget.style.transform = 'translateY(-22px) scale(1.05)'}

          >
            <Icon name="plusBig" size={26} color="#fff" />

        );
        const isActive = active === t.id;
        return (
          <button key={t.id} onClick={() => onChange && onChange(t.id)} style={{

              strokeWidth={isActive ? 2.2 : 1.75} />

              fontFamily: SPOTA.font.ui, fontSize: 10.5, fontWeight: isActive ? 700 : 500,
              color: isActive ? SPOTA.c.primary : SPOTA.c.textMuted,
            }}>{t.label}</span>
          </button>
        );
      })}
    </div>
  );
};

// ─────────────────────────────────────────────────────────────
// Input field
// ─────────────────────────────────────────────────────────────
const Field = ({ label, type = 'text', value, onChange, placeholder, icon, hint, error }) => {
  const [focus, setFocus] = React.useState(false);
  const [show, setShow] = React.useState(false);
  const isPwd = type === 'password';
  return (
    <label style={{ display: 'block' }}>
      {label && <div style={{ fontFamily: SPOTA.font.ui, fontWeight: 600, fontSize: 13, color: SPOTA.c.text, marginBottom: 6 }}>{label}</div>}
      <div style={{
        display: 'flex', alignItems: 'center', gap: 10,
        height: 50, padding: '0 14px',
        background: SPOTA.c.surface, borderRadius: 12,
        border: `1.5px solid ${error ? SPOTA.c.danger : (focus ? SPOTA.c.primary : SPOTA.c.line)}`,
        transition: 'border-color 150ms',
      }}>
        {icon && <Icon name={icon} size={18} color={SPOTA.c.textSoft} />}
        <input
          type={isPwd && !show ? 'password' : (isPwd ? 'text' : type)}
          value={value} onChange={(e) => onChange && onChange(e.target.value)}
          onFocus={() => setFocus(true)} onBlur={() => setFocus(false)}
          placeholder={placeholder}
          style={{ flex: 1, border: 'none', outline: 'none', background: 'transparent',
            fontFamily: SPOTA.font.ui, fontSize: 15, color: SPOTA.c.text }}
        />
        {isPwd && (
          <button onClick={(e) => { e.preventDefault(); setShow(s => !s); }} style={{
            border: 'none', background: 'transparent', cursor: 'pointer', padding: 4, color: SPOTA.c.textSoft,
          }}><Icon name={show ? 'eyeOff' : 'eye'} size={18} color={SPOTA.c.textSoft} /></button>
        )}
      </div>
      {(hint || error) && (
        <div style={{ fontFamily: SPOTA.font.ui, fontSize: 12, marginTop: 6,
          color: error ? SPOTA.c.danger : SPOTA.c.textSoft }}>{error || hint}</div>
      )}
    </label>
  );
};

// ─────────────────────────────────────────────────────────────
// Section heading
// ─────────────────────────────────────────────────────────────
const SectionTitle = ({ children, action, onAction }) => (
  <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 10 }}>
    <h2 style={{ margin: 0, fontFamily: SPOTA.font.ui, fontWeight: 700, fontSize: 18, color: SPOTA.c.text }}>{children}</h2>
    {action && (
      <button onClick={onAction} style={{
        border: 'none', background: 'transparent', cursor: 'pointer',
        fontFamily: SPOTA.font.ui, fontSize: 13, fontWeight: 600, color: SPOTA.c.primary,
      }}>{action} →</button>

  </div>
);

// Pill chip (filter)
const Chip = ({ children, active, onClick, icon }) => (
  <button onClick={onClick} style={{
    display: 'inline-flex', alignItems: 'center', gap: 6,
    height: 36, padding: '0 14px', borderRadius: 999, cursor: 'pointer',
    background: active ? SPOTA.c.primary : SPOTA.c.surface,
    color: active ? '#fff' : SPOTA.c.text,
    border: `1px solid ${active ? SPOTA.c.primary : SPOTA.c.line}`,
    fontFamily: SPOTA.font.ui, fontWeight: 600, fontSize: 13.5,
    whiteSpace: 'nowrap', transition: 'all 150ms',
  }}>
    {icon && <Icon name={icon} size={14} />}
    {children}
  </button>
);

// Empty state
const EmptyState = ({ icon, title, subtitle, action }) => (
  <div style={{ padding: '40px 20px', textAlign: 'center' }}>
    <div style={{
      width: 72, height: 72, borderRadius: 999, background: SPOTA.c.primarySoft,
      display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 16px',
    }}><Icon name={icon || 'sparkles'} size={32} color={SPOTA.c.primary} /></div>
    <h3 style={{ margin: '0 0 6px', fontFamily: SPOTA.font.ui, fontWeight: 700, fontSize: 18, color: SPOTA.c.text }}>{title}</h3>
    {subtitle && <p style={{ margin: '0 0 16px', fontFamily: SPOTA.font.ui, fontSize: 14, color: SPOTA.c.textSoft }}>{subtitle}</p>}
    {action}
  </div>
);

Object.assign(window, {
  Icon, SpotaLogo, Btn, Tag, ProofOfVisit, FamaScore, PlaceCard, Avatar,
  SearchBar, AppHeader, TabBar, Field, SectionTitle, Chip, EmptyState,
});

</script>

<script>
// Bootstrap: transform & eval each text/babel script in order, in document scope.
// This is more reliable than Babel's auto-runner for many large inline scripts.
window.addEventListener('DOMContentLoaded', () => {
  const scripts = [...document.querySelectorAll('script[type="text/babel"]')];
  for (let i = 0; i < scripts.length; i++) {
    const s = scripts[i];
    try {
      const code = Babel.transform(s.textContent, { presets: ['react'] }).code;
      // Use indirect eval so it runs in global scope
      (0, eval)(code);
    } catch (e) {
      console.error('[bootstrap] script', i, 'failed:', e);
      const div = document.getElementById('app');
      if (div) div.innerHTML = '<pre style="color:#f88;padding:24px;font-family:monospace;font-size:12px;white-space:pre-wrap">Error en script ' + i + ':\n' + (e.message || e) + '</pre>';
      break;
    }
  }
});
</script>

    </div>
  );
};

// ===== Sidebar con índice de pantallas =====
const SCREENS_WITH_TAB = new Set(['home', 'collections', 'plans', 'profile']);

const Sidebar = ({ current, nav, onClose }) => {
  const grouped = useMemo(() => {
    const g = {};
    GROUP_ORDER.forEach(k => g[k] = []);
    SCREENS.forEach(s => { (g[s.group] = g[s.group] || []).push(s); });
    return g;
  }, []);
  return (
    <aside style={{
      width: 280, height: '100vh', position: 'sticky', top: 0,
      background: 'rgba(20, 17, 15, 0.96)',
      borderRight: '1px solid rgba(245, 237, 224, 0.08)',
      backdropFilter: 'blur(12px)',
      display: 'flex', flexDirection: 'column',
      overflow: 'hidden', flexShrink: 0,
    }}>
      <div style={{ padding: '22px 22px 14px', borderBottom: '1px solid rgba(245, 237, 224, 0.08)' }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <div style={{ width: 28, height: 28, borderRadius: 8, background: SPOTA.c.secondary, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <Icon name="pinFill" size={16} color="#fff" />
            </div>
            <div>
              <div style={{ fontFamily: SPOTA.font.ui, fontWeight: 800, fontSize: 16, letterSpacing: -0.3 }}>Spota</div>
              <div style={{ fontFamily: SPOTA.font.ui, fontSize: 10.5, color: 'rgba(245, 237, 224, 0.5)', letterSpacing: 0.6, textTransform: 'uppercase' }}>Prototipo · v1</div>
            </div>
          </div>
          {onClose && (
            <button onClick={onClose} style={{ width: 28, height: 28, borderRadius: 8, border: 'none', background: 'rgba(255,255,255,0.06)', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#f5ede0' }}>
              <Icon name="close" size={14} color="#f5ede0" />
            </button>
          )}
        </div>
        <p style={{ margin: '14px 0 0', fontFamily: SPOTA.font.ui, fontSize: 12, color: 'rgba(245, 237, 224, 0.55)', lineHeight: 1.5 }}>
          23 casos de uso · iOS · español rioplatense
        </p>
      </div>
      <div style={{ flex: 1, overflowY: 'auto', padding: '8px 12px 24px' }}>
        {GROUP_ORDER.map(group => (
          <div key={group} style={{ marginBottom: 14 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px 10px 6px' }}>
              <Icon name={GROUP_ICONS[group]} size={12} color="rgba(245, 237, 224, 0.45)" />
              <span style={{ fontFamily: SPOTA.font.ui, fontSize: 10.5, fontWeight: 700, color: 'rgba(245, 237, 224, 0.45)', textTransform: 'uppercase', letterSpacing: 0.8 }}>{group}</span>
            </div>
            {(grouped[group] || []).map(s => {
              const active = current === s.id;
              return (
                <button key={s.id} onClick={() => nav(s.id)} style={{
                  display: 'flex', alignItems: 'center', gap: 10, width: '100%',
                  padding: '8px 10px', border: 'none',
                  background: active ? 'rgba(184, 92, 56, 0.18)' : 'transparent',
                  borderRadius: 8, cursor: 'pointer', textAlign: 'left',
                  marginBottom: 1,
                }}>
                  <span style={{ fontFamily: 'ui-monospace, monospace', fontSize: 10, color: active ? SPOTA.c.secondaryLight : 'rgba(245, 237, 224, 0.4)', flexShrink: 0, width: 38 }}>{s.cu}</span>
                  <span style={{ fontFamily: SPOTA.font.ui, fontSize: 13, color: active ? '#f5ede0' : 'rgba(245, 237, 224, 0.75)', fontWeight: active ? 600 : 500, flex: 1, lineHeight: 1.3 }}>{s.title}</span>
                  {active && <span style={{ width: 6, height: 6, borderRadius: 999, background: SPOTA.c.secondary }} />}
                </button>
              );
            })}
          </div>
        ))}
      </div>
    </aside>
  );
};

// ===== Top toolbar =====
const TopBar = ({ screen, onToggleSidebar, sidebarOpen, onPrev, onNext }) => {
  const idx = SCREENS.findIndex(s => s.id === screen?.id);
  return (
    <header style={{
      height: 56, padding: '0 20px',
      display: 'flex', alignItems: 'center', gap: 14,
      background: 'rgba(20, 17, 15, 0.6)',
      borderBottom: '1px solid rgba(245, 237, 224, 0.06)',
      flexShrink: 0, backdropFilter: 'blur(8px)',
    }}>
      <button onClick={onToggleSidebar} style={{ width: 36, height: 36, borderRadius: 10, border: 'none', background: 'rgba(245, 237, 224, 0.06)', cursor: 'pointer', color: '#f5ede0', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <Icon name={sidebarOpen ? 'close' : 'menu'} size={16} color="#f5ede0" />
      </button>
      <div style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 10 }}>
        <span style={{ fontFamily: 'ui-monospace, monospace', fontSize: 11, padding: '3px 8px', borderRadius: 999, background: 'rgba(184, 92, 56, 0.2)', color: SPOTA.c.secondaryLight, fontWeight: 700, letterSpacing: 0.4 }}>
          {screen?.cu || '—'}
        </span>
        <span style={{ fontFamily: SPOTA.font.ui, fontSize: 14, fontWeight: 600, color: '#f5ede0' }}>
          {screen?.title || ''}
        </span>
        <span style={{ fontFamily: SPOTA.font.ui, fontSize: 11.5, color: 'rgba(245, 237, 224, 0.4)', marginLeft: 4 }}>
          {idx + 1} / {SCREENS.length}
        </span>
      </div>
      <button onClick={onPrev} style={{ width: 36, height: 36, borderRadius: 10, border: 'none', background: 'rgba(245, 237, 224, 0.06)', cursor: 'pointer', color: '#f5ede0', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <Icon name="arrowLeft" size={16} color="#f5ede0" />
      </button>
      <button onClick={onNext} style={{ width: 36, height: 36, borderRadius: 10, border: 'none', background: 'rgba(245, 237, 224, 0.06)', cursor: 'pointer', color: '#f5ede0', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <Icon name="arrowRight" size={16} color="#f5ede0" />
      </button>
    </header>
  );
};

// ===== App root =====
const App = () => {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [current, setCurrent] = useState(() => {
    const hash = window.location.hash.replace('#', '');
    return SCREENS.find(s => s.id === hash) ? hash : 'splash';
  });
  const [sidebarOpen, setSidebarOpen] = useState(true);

  useEffect(() => {
    window.location.hash = current;
  }, [current]);

  useEffect(() => {
    const onPop = () => {
      const hash = window.location.hash.replace('#', '');
      if (SCREENS.find(s => s.id === hash)) setCurrent(hash);
    };
    window.addEventListener('hashchange', onPop);
    return () => window.removeEventListener('hashchange', onPop);
  }, []);

  // Make tweaks globally readable by screens
  useEffect(() => { window.__SPOTA_TWEAKS = tweaks; }, [tweaks]);

  const nav = (id) => { setCurrent(id); };

  const screen = SCREENS.find(s => s.id === current) || SCREENS[0];
  const ScreenComp = window[screen.comp];
  const showTab = SCREENS_WITH_TAB.has(screen.id);

  const idx = SCREENS.findIndex(s => s.id === current);
  const onPrev = () => nav(SCREENS[(idx - 1 + SCREENS.length) % SCREENS.length].id);
  const onNext = () => nav(SCREENS[(idx + 1) % SCREENS.length].id);

  const showSidebar = tweaks.showSidebar && sidebarOpen;

  return (
    <div style={{ display: 'flex', minHeight: '100vh' }}>
      {showSidebar && <Sidebar current={current} nav={nav} onClose={() => setSidebarOpen(false)} />}
      <main style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
        <TopBar screen={screen} onToggleSidebar={() => setSidebarOpen(o => !o)} sidebarOpen={sidebarOpen && tweaks.showSidebar} onPrev={onPrev} onNext={onNext} />
        <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '24px 16px 32px', overflow: 'auto' }}>
          <IOSDevice width={390} height={844}>
            <div style={{ height: 54, flexShrink: 0 }} />
            {ScreenComp ? (
              <ScreenComp nav={nav} tweaks={tweaks} />
            ) : (
              <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24, textAlign: 'center', fontFamily: SPOTA.font.ui, color: SPOTA.c.textSoft }}>
                Pantalla no encontrada: {screen.comp}
              </div>
            )}
            {showTab && <TabBar current={current} nav={nav} />}
          </IOSDevice>
        </div>
      </main>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Densidad de cards" hint="Cuánto aire dejan las tarjetas en Descubrir">
          <TweakRadio
            value={tweaks.density}
            onChange={(v) => setTweak('density', v)}
            options={[
              { value: 'compact', label: 'Compacta' },
              { value: 'cozy',    label: 'Cómoda' },
              { value: 'roomy',   label: 'Espaciosa' },
            ]}
          />
        </TweakSection>
        <TweakSection label="Visualización del Fama Score" hint="Cómo se muestra el score en cards y perfiles">
          <TweakRadio
            value={tweaks.famaVariant}
            onChange={(v) => setTweak('famaVariant', v)}
            options={[
              { value: 'classic', label: 'Estrella + número' },
              { value: 'orbit',   label: 'Anillo radial' },
              { value: 'badge',   label: 'Pill compacto' },
            ]}
          />
        </TweakSection>
        <TweakSection label="Navegación del prototipo">
          <TweakToggle
            label="Mostrar sidebar de pantallas"
            value={tweaks.showSidebar}
            onChange={(v) => setTweak('showSidebar', v)}
          />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
